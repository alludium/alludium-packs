name: Sync Generated Markdown

on:
  pull_request:
    paths:
      - ".github/workflows/sync-generated-markdown.yml"
      - "plugins/vc/agents/**"
      - "plugins/vc/tasks/**"
      - "plugins/vc/alludium/agent-templates/**"
      - "plugins/vc/alludium/task-definition-templates/**"
      - "plugins/vc/scripts/generate_markdown.py"

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-generated-markdown-${{ github.event.pull_request.number }}
  # Keep runs serialized instead of cancelling mid-generation or mid-push.
  cancel-in-progress: false

jobs:
  sync-generated-markdown:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r plugins/vc/requirements.txt
      - name: Commit generated Markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin "${{ github.head_ref }}"
            git reset --hard "origin/${{ github.head_ref }}"

            python plugins/vc/scripts/generate_markdown.py

            if git diff --quiet -- plugins/vc/agents plugins/vc/tasks; then
              echo "Generated Markdown is already up to date."
              exit 0
            fi

            git add plugins/vc/agents plugins/vc/tasks
            git commit -m "Regenerate VC agent and task Markdown"

            if git push origin "HEAD:${{ github.head_ref }}"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Generated Markdown push failed after 3 attempts." >&2
              exit 1
            fi

            echo "PR branch changed during sync; retrying from the latest branch head."
            sleep 3
          done

          gh workflow run validate.yml --ref "${{ github.head_ref }}"
        env:
          GH_TOKEN: ${{ github.token }}
