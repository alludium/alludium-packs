kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.generate_82_factor_questions
version: 1.0.3
title: Generate 82-Factor Questions
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - follow-up
  - questions
definition:
  name: Generate 82-Factor Questions
  slug: generate-82-factor-questions
  description: Generate 82-Factor Questions for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: follow_up
    taskFamily: diligence
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_first_look_analyst
    recommendedAgentTemplate: vc_first_look_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-16
        note: Follow-up AI map
      - source: investment-management-process-slides
        anchor: slide-35
        note: 82-Factor dimensions
    instructions:
      executionInstructions: Generate prioritized 82-Factor diligence questions with rationale, source gap, owner, and urgency. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named 82-Factor Question Set and attach it to the required output field `eighty_two_factor_questions_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: 82-factor-diligence-question-generation
        note: Use only when the workspace explicitly configures this diligence framework.
