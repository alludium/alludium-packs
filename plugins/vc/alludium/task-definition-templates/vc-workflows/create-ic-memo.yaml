kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.create_ic_memo
version: 1.0.4
title: Create IC Memo
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - investment-committee
  - memo
definition:
  name: Create IC Memo
  slug: create-ic-memo
  description: Create IC Memo for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: review
    taskFamily: ic
    requiredSkills:
      - ic-memo-assembly
      - citation-enforcement
    plannedRequiredSkills:
      - ic-memo-assembly
      - citation-enforcement
      - ic-risk-checklist-and-decision-log
    plannedRecommendedAgentTemplate: vc_ic_prep_producer
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-27
        note: IC pack and process
      - source: investment-management-process-slides
        anchor: slide-28
        note: IC risk framework
      - source: investment-management-process-slides
        anchor: slide-29
        note: IC AI map
      - source: investment-management-process-slides
        anchor: slide-36
        note: Tools
      - source: investment-management-process-slides
        anchor: slide-41
        note: Historic/post-investment risks
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 50
      - source: investment-management-process-slides
        anchor: slide-37
        note: Benchmark references
      - source: investment-management-process-slides
        anchor: slide-38
        note: Process summary
      - source: investment-management-process-slides
        anchor: slide-39
        note: Decision hierarchy
      - source: investment-management-process-slides
        anchor: slide-40
        note: DD timeline
    instructions:
      executionInstructions: Assemble the IC memo and pack checklist from stage outputs, DD summaries, founder risks, term-sheet inputs, source artifacts, unresolved risks, assumptions, and citation coverage. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required diligence input file artifacts `commercial_dd_artifact_id`, `financial_dd_artifact_id`, `founder_evaluation_artifact_id`, `technical_dd_artifact_id`, and `eighty_two_factor_questions_artifact_id` as source artifacts for the IC memo. Create or update a durable project file artifact named Investment Memo and attach it to the required output field `investment_memo_artifact_id`. Use the required input file artifacts `team_review_pack_artifact_id` and `partner_review_pack_artifact_id` as the review-pack sources for the IC memo.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    supportedProjectTypes:
      - vc_deal_room
    recommendedAgentTemplate: vc_ic_prep_producer

