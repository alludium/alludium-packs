definition:
  name: Create IC Memo
  slug: create-ic-memo
  description: Create IC Memo for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: decision_review
    taskFamily: ic
    documentRefs:
    - documentId: vc.document.investment_memo_template
      usage: output_template
      outputFieldKey: investment_memo_artifact_id
    - documentId: vc.document.opportunity_evaluation_framework
      usage: methodology
    - documentId: vc.document.evaluation_workstream_guide
      usage: methodology
    - documentId: vc.document.formal_diligence_workstream_guide
      usage: methodology
    - documentId: vc.document.formal_diligence_checklist
      usage: checklist
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - ic-memo-assembly
    - citation-enforcement
    - ic-risk-checklist-and-decision-log
    plannedRecommendedAgentTemplate: vc_ic_prep_producer
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-27
      note: IC pack and process
    - source: investment-management-process-slides
      anchor: slide-28
      note: IC risk framework
    - source: investment-management-process-slides
      anchor: slide-29
      note: IC AI map
    - source: investment-management-process-slides
      anchor: slide-36
      note: Tools
    - source: investment-management-process-slides
      anchor: slide-41
      note: Historic/post-investment risks
    - source: atomic-agents
      anchor: worksheet-atomic-agents
      note: Spreadsheet row 50
    - source: investment-management-process-slides
      anchor: slide-37
      note: Benchmark references
    - source: investment-management-process-slides
      anchor: slide-38
      note: Process summary
    - source: investment-management-process-slides
      anchor: slide-39
      note: Decision hierarchy
    - source: investment-management-process-slides
      anchor: slide-40
      note: DD timeline
    instructions:
      executionInstructions: 'Assemble the IC memo and pack checklist from review packs, evaluation-stage workstream outputs, available formal
        diligence outputs, source artifacts, unresolved risks, assumptions, and citation coverage. Cite material claims, separate assumptions
        from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit
        human approval. Use required evaluation input file artifacts `commercial_evaluation_artifact_id`, `technical_evaluation_artifact_id`,
        `financial_evaluation_artifact_id`, `team_evaluation_artifact_id`, and `diligence_question_bank_artifact_id` as the decision-review source
        set. Use formal diligence artifacts `commercial_dd_artifact_id`, `financial_dd_artifact_id`, `founder_evaluation_artifact_id`, and `technical_dd_artifact_id`
        when present, but do not block evaluation-stage review on them. Use the required input file artifacts `team_review_pack_artifact_id` and
        `partner_review_pack_artifact_id` as the review-pack sources for the IC memo. Create or update a durable project file artifact named Investment
        Memo as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use the Project Instantiate Template tool, `project.instantiateTemplate`, or `project_instantiateTemplate`, and do not create a `.md`/`text/markdown` artifact for this rendered output. Follow the shared VC HTML Artifact Contract in Template Use Guidance: copy the `:root` token alias block into the stylesheet, use `--color-primary`, `--color-secondary`, and the shared `.document`, `.document-header`, `.summary-grid`, `.section`, `.badge`, `.badge.secondary`, `.metadata`, `.eyebrow`, `.note`, and table styles. Before saving, inspect the final HTML source and revise it if these token aliases or shared classes are missing. Then attach it to the required output field `investment_memo_artifact_id`. Use `definitionJson.documentRefs` only as source guidance for rendered outputs. Read referenced templates, methodologies, checklists, style guides, operating guidance, and policies, but convert the referenced Markdown/template sections into semantic standalone HTML for `artifact.createTextArtifact`: keep the required first summary section from the task or template, preserve decision-critical section order, omit unsupported boilerplate, and resolve conflicts in favor of the shared HTML contract plus task-specific heading requirements. For refs with `outputFieldKey`, save the `artifact.createTextArtifact` result to that output field and preserve the document ID alongside the output artifact.'
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation,
        or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    supportedProjectTypes:
    - vc_deal_room
    recommendedAgentTemplate: vc_ic_prep_producer
