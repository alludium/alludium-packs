kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.ingest_manual_sourcing_tip
version: 0.1.0
title: Ingest Manual Sourcing Tip
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - origination
  - manual-tip
definition:
  name: Ingest Manual Sourcing Tip
  slug: ingest-manual-sourcing-tip
  description: Normalize a manually submitted company or founder lead into the origination candidate model.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: source
    taskFamily: origination_manual_tip
    requiredSkills:
      - vc-manual-tip-ingestion
      - vc-sourcing-dedupe-and-novelty-check
      - citation-enforcement
    plannedRequiredSkills:
      - vc-manual-tip-ingestion
      - vc-sourcing-dedupe-and-novelty-check
      - citation-enforcement
    recommendedAgentTemplate: vc_origination_scout
    plannedRecommendedAgentTemplate: vc_origination_scout
    supportedProjectTypes:
      - vc_origination_pipeline
    supportedProjectScopes:
      - project_instance
    instructions:
      executionInstructions: Mirror the reference pipeline's manual-tip ingestion by normalizing supplied company, founder, website, LinkedIn, note, and source context into the candidate schema, assigning a stable manual-tip key, setting source and discovery mode, and sending the candidate through enrichment and scoring rather than directly promoting it.
      missingInputPolicy: Ask for company or founder identity, source of tip, website or profile URL, submitter, and confidence if missing.
      externalActionPolicy: Internal candidate normalization only. Do not contact founders, write CRM records, or create Deal Rooms.
      completionCriteria:
        - Manual tip candidate has stable key, source, submitter/source receipt, identity fields, dedupe decision, and next-step recommendation.
fields:
  input:
    - key: manual_tip
      name: Manual Tip
      fieldType: json
      required: true
      position: 0
      config: {}
  output:
    - key: manual_tip_ingestion_artifact_id
      name: Manual Tip Ingestion Artifact
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: normalized_candidate_key
      name: Normalized Candidate Key
      fieldType: string
      required: false
      position: 1
      config: {}
    - key: ingestion_report
      name: Ingestion Report
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 6
