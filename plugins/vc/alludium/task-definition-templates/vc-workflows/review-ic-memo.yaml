kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.review_ic_memo
version: 1.0.19
title: Review IC Memo
category: Venture Capital
visibility: workspace
tags:
  - vc
  - investment-committee
  - review
definition:
  name: Review IC Memo
  slug: review-ic-memo
  description: Review IC Memo for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: decision_review
    taskFamily: ic
    documentRefs:
      - documentId: vc.document.ic_memo_review_template
        usage: output_template
        outputFieldKey: ic_memo_review_artifact_id
      - documentId: vc.document.opportunity_evaluation_framework
        usage: methodology
      - documentId: vc.document.evaluation_workstream_guide
        usage: methodology
      - documentId: vc.document.formal_diligence_workstream_guide
        usage: methodology
      - documentId: vc.document.formal_diligence_checklist
        usage: checklist
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - citation-enforcement
      - ic-memo-assembly
      - ic-risk-checklist-and-decision-log
    plannedRecommendedAgentTemplate: vc_ic_prep_producer
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-27
        note: IC pack and process
      - source: investment-management-process-slides
        anchor: slide-28
        note: IC risk framework
      - source: investment-management-process-slides
        anchor: slide-41
        note: Historic/post-investment risks
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 47
      - source: investment-management-process-slides
        anchor: slide-29
        note: IC AI map
    instructions:
      executionInstructions: >-
        Review the IC memo and pack for findings, citation gaps, assumption gaps, unresolved risks, decision readiness, and required changes. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required input file artifacts `investment_memo_artifact_id` and `ic_agenda_artifact_id` as the memo and agenda under review; do not substitute a task slug, UI label, or pasted memo text for artifact-backed files. Create or update a durable project file artifact named IC Memo Review as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use the Project Instantiate Template tool, `project.instantiateTemplate`, or `project_instantiateTemplate`, and do not create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `ic_memo_review_artifact_id`. Use `definitionJson.documentRefs` only as source guidance for rendered outputs. Read referenced templates, methodologies, checklists, style guides, operating guidance, and policies, but convert the referenced Markdown/template sections into semantic standalone HTML for `artifact.createTextArtifact`: keep the required first summary section from the task or template, preserve decision-critical section order, omit unsupported boilerplate, and resolve conflicts in favor of the shared HTML contract plus task-specific heading requirements. For refs with `outputFieldKey`, save the `artifact.createTextArtifact` result to that output field and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    supportedProjectTypes:
      - vc_deal_room
    recommendedAgentTemplate: vc_ic_prep_producer

fields:
  input:
    - key: investment_memo_artifact_id
      name: Investment Memo
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: ic_agenda_artifact_id
      name: IC Agenda
      fieldType: file
      required: true
      position: 1
      config: {}

  output:
    - key: ic_memo_review_artifact_id
      name: IC Memo Review
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.ic_memo_review_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: review_ic_memo
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: false
    requiresHumanConfirmationToComplete: true
    preferredMode: iterative_drafting
    preferredAgentType: vc_ic_prep_producer
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
