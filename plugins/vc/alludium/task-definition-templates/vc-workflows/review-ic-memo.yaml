kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.review_ic_memo
version: 1.0.5
title: Review IC Memo
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - investment-committee
  - review
definition:
  name: Review IC Memo
  slug: review-ic-memo
  description: Review IC Memo for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: review
    taskFamily: ic
    requiredSkills:
      - citation-enforcement
      - ic-memo-assembly
    plannedRequiredSkills:
      - citation-enforcement
      - ic-risk-checklist-and-decision-log
      - ic-memo-assembly
    plannedRecommendedAgentTemplate: vc_ic_prep_producer
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-27
        note: IC pack and process
      - source: investment-management-process-slides
        anchor: slide-28
        note: IC risk framework
      - source: investment-management-process-slides
        anchor: slide-41
        note: Historic/post-investment risks
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 47
      - source: investment-management-process-slides
        anchor: slide-29
        note: IC AI map
    instructions:
      executionInstructions: Review the IC memo and pack for findings, citation gaps, assumption gaps, unresolved risks, decision readiness, and required changes. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required input file artifacts `investment_memo_artifact_id` and `ic_agenda_artifact_id` as the memo and agenda under review; do not substitute a task slug, UI label, or pasted memo text for artifact-backed files. Create or update a durable project file artifact named IC Memo Review and attach it to the required output field `ic_memo_review_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    supportedProjectTypes:
      - vc_deal_room
    recommendedAgentTemplate: vc_ic_prep_producer

