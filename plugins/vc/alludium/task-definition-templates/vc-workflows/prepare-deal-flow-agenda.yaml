kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_deal_flow_agenda
version: 1.0.2
title: Prepare Deal Flow Agenda
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - discovery
  - pipeline
definition:
  name: Prepare Deal Flow Agenda
  slug: prepare-deal-flow-agenda
  description: Prepare Deal Flow Agenda for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: assessment
    taskFamily: pipeline
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - vc-task-and-next-step-generation
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_pipeline_autopilot
    recommendedAgentTemplate: vc_pipeline_autopilot
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-8
        note: Deal flow pipeline
      - source: investment-management-process-slides
        anchor: slide-10
        note: Discovery AI map
      - source: investment-management-process-slides
        anchor: slide-39
        note: Decision hierarchy
    instructions:
      executionInstructions: Prepare the deal-flow agenda from the pipeline snapshot; identify stale deals, new deals, stage-change candidates, and the seven-day action plan. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: pipeline-health-and-crm-hygiene
        note: Use only when the workspace CRM/stage model matches the skill assumptions.
