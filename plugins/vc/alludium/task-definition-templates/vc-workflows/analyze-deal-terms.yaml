kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.analyze_deal_terms
version: 0.1.2
title: Analyze Deal Terms
category: Venture Capital
visibility: workspace
tags:
  - vc
  - deal-structuring
  - deal-terms
  - valuation
definition:
  name: Analyze Deal Terms
  slug: analyze-deal-terms
  description: Analyze proposed venture deal economics, ownership, dilution, ESOP, and commercial open terms without providing legal advice or approving terms.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: deal_structuring
    taskFamily: deal_structuring
    documentRefs:
      - documentId: vc.document.deal_terms_analysis_template
        usage: output_template
        outputFieldKey: deal_terms_analysis_artifact_id
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - deal-terms-analysis
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-31
        note: Closing process and term-sheet preparation
      - source: investment-management-process-slides
        anchor: slide-32
        note: Term sheet/legal execution
      - source: public-pattern-review
        anchor: deal-flow-stage-refactor-spec-public-pattern-review
        note: Thin task contract, explicit inputs/outputs, human approval boundaries
    instructions:
      executionInstructions: >-
        Analyze the proposed investment amount, valuation, round size, cap table, ownership target, ESOP, co-investors, and reserve policy as commercial deal economics. Model ownership, dilution, valuation sensitivity, and open commercial terms only from supplied evidence. Cite material claims, separate assumptions from evidence, and do not provide legal advice, negotiate terms, approve terms, send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Deal Terms Analysis as a standalone safe static HTML artifact using `artifact_createTextArtifact`, a `.html` filename, and `mimeType: "text/html"`; then attach it to the required output field `deal_terms_analysis_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required economics inputs before producing ownership, valuation, or reserve conclusions.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material economics conclusions include source links or are labeled as human judgment calls.
        - Open terms and IC questions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve valuation, ownership, ESOP, reserve, term-sheet, and investment-stage recommendations.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
