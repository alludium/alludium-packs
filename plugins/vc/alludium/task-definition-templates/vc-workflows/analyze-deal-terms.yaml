    - key: valuation
      name: Valuation
      fieldType: string
      required: true
      position: 1
      config: {}
    - key: round_size
      name: Round Size
      fieldType: string
      required: true
      position: 2
      config: {}
    - key: cap_table_artifact_id
      name: Cap Table
      fieldType: file
      required: true
      position: 3
      config: {}
    - key: esop
      name: ESOP
      fieldType: string
      required: false
      position: 4
      config: {}
    - key: co_investors
      name: Co-investors
      fieldType: json
      required: false
      position: 5
      config: {}
    - key: ownership_target
      name: Ownership Target
      fieldType: string
      required: false
      position: 6
      config: {}
    - key: follow_on_reserve_policy
      name: Follow-on Reserve Policy
      fieldType: richtext
      required: false
      position: 7
      config:
        rows: 4
    - key: deal_terms_snapshot
      name: Deal Terms Snapshot
      fieldType: json
      required: false
      position: 8
      config: {}
    - key: financial_forecast_artifact_id
      name: Financial Forecast
      fieldType: file
      required: false
      position: 9
      config: {}

  output:
    - key: deal_terms_analysis_artifact_id
      name: Deal Terms Analysis
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.deal_terms_analysis_template
    - key: open_commercial_terms
      name: Open Commercial Terms
      fieldType: json
      required: false
      position: 1
      config: {}
runtime:
  defaultExecutionContext:
