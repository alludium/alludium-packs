kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.manage_closing_checklist
version: 1.0.14
title: Manage Closing Checklist
category: Venture Capital
visibility: workspace
tags:
- vc
- closing
- checklist
definition:
  name: Manage Closing Checklist
  slug: manage-closing-checklist
  description: Manage Closing Checklist for one venture-capital opportunity with evidence capture, human review gates, and
    next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: closing
    taskFamily: closing
    documentRefs:
    - documentId: vc.document.closing_checklist
      usage: output_template
      outputFieldKey: closing_checklist_artifact_id
    - documentId: vc.document.legal_diligence_guide
      usage: methodology
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - citation-enforcement
    - closing-coordination-and-cp-tracking
    - vc-task-and-next-step-generation
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
    - vc_investment_management
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-31
      note: Closing process
    - source: investment-management-process-slides
      anchor: slide-32
      note: Term sheet/legal execution
    - source: investment-management-process-slides
      anchor: slide-33
      note: Closing AI map
    - source: atomic-agents
      anchor: worksheet-atomic-agents
      note: Spreadsheet row 62
    instructions:
      executionInstructions: 'Track closing workplan owners, due dates, blockers, daily status, and onboarding readiness for
        human close-readiness review. Cite material claims, separate assumptions from evidence, and do not send messages,
        mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use
        the required input file artifacts `ic_decision_record_artifact_id` and `term_sheet_review_artifact_id` as the decision
        and terms sources, and use `closing_source_artifact_ids` for legal documents, workplans, counsel notes, CP lists,
        signed documents, and evidence files. Create or update a durable project file artifact named Closing Checklist and
        attach it to the required output field `closing_checklist_artifact_id`. Use `definitionJson.documentRefs` as the durable
        document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology`
        supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide`
        governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries.
        For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID
        alongside the output artifact.'
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation,
        child task creation, or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
  - key: ic_decision_record_artifact_id
    name: IC Decision Record
    fieldType: file
    required: true
    position: 0
    config: {}
  - key: term_sheet_review_artifact_id
    name: Term Sheet Review
    fieldType: file
    required: true
    position: 1
    config: {}
  - key: closing_source_artifact_ids
    name: Closing Source Artifact IDs
    fieldType: string
    required: true
    position: 2
    config: {}
  - key: legal_document_status
    name: Legal Document Status
    fieldType: string
    required: true
    position: 3
    config: {}
  - key: legal_diligence_artifact_id
    name: Legal Diligence
    fieldType: file
    required: false
    position: 4
    config: {}
  - key: investment_document_review_artifact_id
    name: Investment Document Review
    fieldType: file
    required: false
    position: 5
    config: {}
  - key: owners
    name: Owners
    fieldType: json
    required: false
    position: 6
    config: {}
  - key: deadlines
    name: Deadlines
    fieldType: json
    required: false
    position: 7
    config: {}
  - key: blockers
    name: Blockers
    fieldType: json
    required: false
    position: 8
    config: {}
  output:
  - key: closing_checklist_artifact_id
    name: Closing Checklist
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.closing_checklist
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: manage_closing_checklist
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: review
    preferredAgentType: vc_legal_compliance_desk
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
