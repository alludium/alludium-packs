kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.manage_closing_checklist
version: 1.0.2
title: Manage Closing Checklist
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - closing
  - checklist
definition:
  name: Manage Closing Checklist
  slug: manage-closing-checklist
  description: Manage Closing Checklist for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: closing
    taskFamily: closing
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - closing-coordination-and-cp-tracking
      - vc-task-and-next-step-generation
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-31
        note: Closing process
      - source: investment-management-process-slides
        anchor: slide-32
        note: Term sheet/legal execution
      - source: investment-management-process-slides
        anchor: slide-33
        note: Closing AI map
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 62
    instructions:
      executionInstructions: Track closing workplan owners, due dates, blockers, daily status, and onboarding readiness for human close-readiness review. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required input file artifacts `ic_decision_record_artifact_id` and `term_sheet_review_artifact_id` as the decision and terms sources, and use `closing_source_artifact_ids` for legal documents, workplans, counsel notes, CP lists, signed documents, and evidence files. Create or update a durable project file artifact named Closing Checklist and attach it to the required output field `closing_checklist_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
