kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.check_affinity_relationships
version: 0.1.3
title: Check Affinity Relationship Context
category: Venture Capital
visibility: workspace
tags:
  - vc
  - origination
  - affinity
  - enrichment
definition:
  name: Check Affinity Relationship Context
  slug: check-affinity-relationship-context
  description: Check whether sourcing candidates are already known in Affinity and capture relationship context without changing CRM records.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: enrich
    taskFamily: origination_relationship_check
    requiredSkills:
      - vc-relationship-context-check
      - citation-enforcement
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
      - vc_origination_pipeline
    supportedProjectScopes:
      - project_instance
    instructions:
      executionInstructions: Mirror the reference pipeline's Affinity check by preferring exact domain match from enrichment or LinkedIn company data, then name fallback; treat a name-only match with no lists, notes, interactions, or owners as not found. Return lists, notes count, interaction flags, owner flags, deep link, and whether the company is known to the firm.
      missingInputPolicy: Ask for candidate batch, Affinity availability, approved lookup scope, and whether cached relationship state may be reused.
      externalActionPolicy: Read-only relationship check. Do not create organizations, list entries, notes, field values, tasks, or outreach.
      completionCriteria:
        - Each checked candidate has found/not-found, matched-by, known-in-CRM, list names, note counts, interaction flags, owner flags, and source receipt where available.
        - False-positive name-only matches are explicitly rejected.
fields:
  input:
    - key: relationship_check_scope
      name: Relationship Check Scope
      fieldType: json
      required: true
      position: 0
      config: {}
  output:
    - key: relationship_context_artifact_id
      name: Relationship Context Artifact
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: known_candidate_count
      name: Known Candidate Count
      fieldType: number
      required: false
      position: 1
      config: {}
    - key: relationship_report
      name: Relationship Report
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 8
