kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_lead_gen_packet
version: 1.0.3
title: Prepare Lead Gen Packet
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - discovery
  - lead-gen
definition:
  name: Prepare Lead Gen Packet
  slug: prepare-lead-gen-packet
  description: Prepare Lead Gen Packet for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: assessment
    taskFamily: pipeline
    requiredSkills:
      - company-research-and-enrichment
      - citation-enforcement
    plannedRequiredSkills:
      - company-research-and-enrichment
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_origination_scout
    recommendedAgentTemplate: vc_origination_scout
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-8
        note: Dual pipeline
      - source: investment-management-process-slides
        anchor: slide-10
        note: Discovery AI map
      - source: investment-management-process-slides
        anchor: slide-38
        note: Process summary
      - source: investment-management-process-slides
        anchor: slide-9
        note: Screening model
      - source: investment-management-process-slides
        anchor: slide-37
        note: Benchmark references
    instructions:
      executionInstructions: Prepare the lead-generation meeting packet from candidate companies and thesis context; include per-company snapshots, discussion points, and proposed next actions. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named Lead Generation Packet and attach it to the required output field `lead_generation_packet_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: market-map-building
        note: Use only when the workspace explicitly configures this market mapping method.
      - skill: ten-factor-evaluation
        note: Use only when the workspace explicitly configures this screening framework.
