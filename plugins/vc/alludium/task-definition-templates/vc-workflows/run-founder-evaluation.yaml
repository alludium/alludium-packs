kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_founder_evaluation
version: 1.0.2
title: Run Founder Evaluation
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - founder-evaluation
  - diligence
definition:
  name: Run Founder Evaluation
  slug: run-founder-evaluation
  description: Run Founder Evaluation for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: diligence
    taskFamily: diligence
    requiredSkills:
      - team-and-hiring-assessment
      - red-flags-scanner
      - citation-enforcement
    plannedRequiredSkills:
      - founder-evaluation-and-reference-checking
      - team-and-hiring-assessment
      - red-flags-scanner
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-17
        note: Founder evaluation stage
      - source: investment-management-process-slides
        anchor: slide-18
        note: Founder evaluation AI map
      - source: investment-management-process-slides
        anchor: slide-34
        note: Roles
    instructions:
      executionInstructions: Prepare founder dossier, reference plan, reference summaries when available, founder risk assessment, stop signals, and human-only judgment prompts. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Founder Evaluation and attach it to the required output field `founder_evaluation_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
