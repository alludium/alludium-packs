kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_founder_evaluation
version: 1.0.16
title: Run Founder Evaluation
category: Venture Capital
visibility: workspace
tags:
- vc
- founder-evaluation
- diligence
definition:
  name: Run Founder Evaluation
  slug: run-founder-evaluation
  description: Run Founder Evaluation for one venture-capital opportunity with evidence capture, human review gates, and next-action
    recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: formal_diligence
    taskFamily: diligence
    documentRefs:
    - documentId: vc.document.diligence_report_template
      usage: output_template
      outputFieldKey: founder_evaluation_artifact_id
    - documentId: vc.document.formal_diligence_workstream_guide
      usage: methodology
    - documentId: vc.document.formal_diligence_checklist
      usage: checklist
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - team-and-hiring-assessment
    - red-flags-scanner
    - citation-enforcement
    - founder-evaluation-and-reference-checking
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
    - vc_investment_management
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-17
      note: Founder evaluation stage
    - source: investment-management-process-slides
      anchor: slide-18
      note: Founder evaluation AI map
    - source: investment-management-process-slides
      anchor: slide-34
      note: Roles
    instructions:
      executionInstructions: 'Prepare founder dossier, reference plan, reference summaries when available, founder risk assessment,
        stop signals, and human-only judgment prompts. Cite material claims, separate assumptions from evidence, and do not
        send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human
        approval. Create or update a durable project file artifact named Founder Evaluation and attach it to the required
        output field `founder_evaluation_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference
        contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring
        or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations
        and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with
        `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the
        output artifact.'
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation,
        child task creation, or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
  - key: founder_names
    name: Founder Names
    fieldType: string
    required: true
    position: 0
    config: {}
  - key: founder_profiles
    name: Founder Profiles
    fieldType: string
    required: true
    position: 1
    config: {}
  - key: reference_inputs
    name: Reference Inputs
    fieldType: string
    required: false
    position: 2
    config: {}
  output:
  - key: founder_evaluation_artifact_id
    name: Founder Evaluation
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.diligence_report_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: run_founder_evaluation
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_diligence_analyst
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
