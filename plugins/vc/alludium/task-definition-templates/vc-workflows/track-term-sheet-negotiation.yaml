kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.track_term_sheet_negotiation
version: 0.1.4
title: Track Term Sheet Negotiation
category: Venture Capital
visibility: workspace
tags:
  - vc
  - deal-structuring
  - term-sheet
  - negotiation
definition:
  name: Track Term Sheet Negotiation
  slug: track-term-sheet-negotiation
  description: Organize open term-sheet issues, give/get options, counsel questions, and approval points without negotiating or approving legal language.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: deal_structuring
    taskFamily: deal_structuring
    documentRefs:
      - documentId: vc.document.term_sheet_negotiation_brief_template
        usage: output_template
        outputFieldKey: negotiation_brief_artifact_id
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - term-sheet-negotiation-brief
      - deal-terms-analysis
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-32
        note: Term sheet/legal execution
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet rows 61, 64, 66-67
      - source: public-pattern-review
        anchor: deal-flow-stage-refactor-spec-public-pattern-review
        note: Thin negotiation-support contract with explicit human approval boundaries
    instructions:
      executionInstructions: >-
        Prepare an internal negotiation brief from the current term sheet, open terms, IC constraints, founder comments or redlines, counsel notes, cap table context, and deal terms analysis. Separate business tradeoffs from counsel review, identify give/get options, and list approval points. Cite material claims, separate assumptions from evidence, and do not provide legal advice, negotiate terms, send terms, approve legal language, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Term Sheet Negotiation Brief as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use the Project Instantiate Template tool, `project.instantiateTemplate`, or `project_instantiateTemplate`, and do not create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `negotiation_brief_artifact_id`. Use `definitionJson.documentRefs` only as source guidance for rendered outputs. Read referenced templates, methodologies, checklists, style guides, operating guidance, and policies, but convert the referenced Markdown/template sections into semantic standalone HTML for `artifact.createTextArtifact`: keep the required first summary section from the task or template, preserve decision-critical section order, omit unsupported boilerplate, and resolve conflicts in favor of the shared HTML contract plus task-specific heading requirements. For refs with `outputFieldKey`, save the `artifact.createTextArtifact` result to that output field and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for the current term sheet, open terms, and IC constraints before producing a negotiation brief.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Open terms distinguish business tradeoffs from counsel questions.
        - Approval points identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve all negotiation positions, founder-facing messages, legal language, and stage movement.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
    - key: term_sheet_artifact_id
      name: Term Sheet Artifact
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: current_open_terms
      name: Current Open Terms
      fieldType: json
      required: true
      position: 1
      config: {}
    - key: ic_constraints
      name: IC Constraints
      fieldType: richtext
      required: true
      position: 2
      config:
        rows: 4
    - key: founder_comments_or_redline
      name: Founder Comments Or Redline
      fieldType: richtext
      required: false
      position: 3
      config:
        rows: 5
    - key: counsel_notes
      name: Counsel Notes
      fieldType: richtext
      required: false
      position: 4
      config:
        rows: 5
    - key: cap_table_artifact_id
      name: Cap Table
      fieldType: file
      required: false
      position: 5
      config: {}
    - key: deal_terms_analysis_artifact_id
      name: Deal Terms Analysis
      fieldType: file
      required: false
      position: 6
      config: {}

  output:
    - key: negotiation_brief_artifact_id
      name: Negotiation Brief
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.term_sheet_negotiation_brief_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: track_term_sheet_negotiation
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: review
    preferredAgentType: vc_legal_compliance_desk
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
