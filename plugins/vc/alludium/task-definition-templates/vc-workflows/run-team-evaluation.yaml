kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_team_evaluation
version: 0.1.3
title: Run Team Evaluation
category: Venture Capital
visibility: workspace
tags:
  - vc
  - evaluation
  - team
  - founders
definition:
  name: Run Team Evaluation
  slug: run-team-evaluation
  description: Run an evaluation-stage team and founder workstream for one venture-capital opportunity, identifying founder evidence, role gaps, team risk, and next proof needed before formal diligence.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: evaluation
    taskFamily: evaluation
    documentRefs:
      - documentId: vc.document.team_evaluation_template
        usage: output_template
        outputFieldKey: team_evaluation_artifact_id
      - documentId: vc.document.evaluation_workstream_guide
        usage: methodology
      - documentId: vc.document.opportunity_evaluation_framework
        usage: methodology
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - team-evaluation-and-founder-risk
      - red-flags-scanner
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_evaluation_analyst
    recommendedAgentTemplate: vc_evaluation_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-35
        note: structured diligence dimensions
    instructions:
      executionInstructions: >-
        Run a team evaluation covering founder-market fit, role coverage, relevant experience, execution evidence, integrity or consistency signals, hiring gaps, adviser or board quality, reference needs, and team gating risk. Use this as evaluation-stage work, not formal founder diligence, completed reference checking, or background checking. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Team Evaluation as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use `project.instantiateTemplate` or create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `team_evaluation_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for the company name and at least one relevant source such as founder names, founder materials, public profiles, meeting notes, team page, hiring plan, relationship context, or reference notes before producing the evaluation.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
    - key: company_name
      name: Company Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: follow_up_evaluation_artifact_id
      name: Opportunity Evaluation
      fieldType: file
      required: false
      position: 1
      config: {}
    - key: opportunity_evidence_artifact_ids
      name: Opportunity Evidence Artifacts
      fieldType: json
      required: false
      position: 2
      config: {}
    - key: team_or_founder_evidence
      name: Team Or Founder Evidence
      fieldType: json
      required: false
      position: 3
      config: {}

  output:
    - key: team_evaluation_artifact_id
      name: Team Evaluation
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.team_evaluation_template
    - key: main_team_hypothesis
      name: Main Team Hypothesis
      fieldType: richtext
      required: false
      position: 1
      config:
        rows: 5
    - key: team_gating_risk
      name: Team Gating Risk
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 5
    - key: next_team_proof_needed
      name: Next Team Proof Needed
      fieldType: richtext
      required: false
      position: 3
      config:
        rows: 5
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: run_team_evaluation
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_evaluation_analyst
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
