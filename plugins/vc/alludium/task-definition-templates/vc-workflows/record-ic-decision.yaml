kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.record_ic_decision
version: 1.0.15
title: Record IC Decision
category: Venture Capital
visibility: workspace
tags:
  - vc
  - investment-committee
  - decision
definition:
  name: Record IC Decision
  slug: record-ic-decision
  description: Record IC Decision for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: decision_review
    taskFamily: ic
    documentRefs:
      - documentId: vc.document.ic_decision_record_template
        usage: output_template
        outputFieldKey: ic_decision_record_artifact_id
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - citation-enforcement
      - ic-risk-checklist-and-decision-log
      - vc-task-and-next-step-generation
    plannedRecommendedAgentTemplate: vc_ic_prep_producer
    recommendedAgentTemplate: vc_ic_prep_producer
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-27
        note: IC pack and process
      - source: investment-management-process-slides
        anchor: slide-29
        note: IC AI map
      - source: investment-management-process-slides
        anchor: slide-41
        note: Historic/post-investment risks
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 49
      - source: investment-management-process-slides
        anchor: slide-28
        note: IC risk framework
    instructions:
      executionInstructions: >-
        Record the IC decision outcome, vote or consensus summary, dissent and objections, conditions, post-IC action items, and stage transition recommendation. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required input file artifacts `investment_memo_artifact_id` and `ic_agenda_artifact_id` as the IC decision record subjects, alongside the transcript or notes. Create or update a durable project file artifact named IC Decision Record as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use `project.instantiateTemplate` or create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `ic_decision_record_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
    - key: investment_memo_artifact_id
      name: Investment Memo
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: ic_agenda_artifact_id
      name: IC Agenda
      fieldType: file
      required: true
      position: 1
      config: {}
    - key: ic_transcript_or_notes
      name: Ic Transcript Or Notes
      fieldType: richtext
      required: true
      position: 2
      config:
        rows: 5
    - key: decision_options
      name: Decision Options
      fieldType: string
      required: true
      position: 3
      config: {}
    - key: conditions_discussed
      name: Conditions Discussed
      fieldType: json
      required: false
      position: 4
      config: {}
    - key: attendees
      name: Attendees
      fieldType: string
      required: false
      position: 5
      config: {}

  output:
    - key: ic_decision_record_artifact_id
      name: IC Decision Record
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.ic_decision_record_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: record_ic_decision
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: false
    requiresHumanConfirmationToComplete: true
    preferredMode: iterative_drafting
    preferredAgentType: vc_ic_prep_producer
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
