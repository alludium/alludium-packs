kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.capture_opportunity_intake
version: 1.0.22
title: Verify Opportunity Intake
category: Venture Capital
visibility: workspace
tags:
- vc
- intake
- readiness
definition:
  name: Verify Opportunity Intake
  slug: capture-opportunity-intake
  description: Verify that a Deal Pipeline has enough supplied or approved source context to move into screening.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: intake
    taskFamily: intake
    documentRefs:
    - documentId: vc.document.deal_room_sop
      usage: operating_guidance
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - deal-pipeline-intake-readiness
    - citation-enforcement
    plannedRecommendedAgentTemplate: vc_intake_readiness_operator
    recommendedAgentTemplate: vc_intake_readiness_operator
    supportedProjectTypes:
    - vc_deal_room
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-9
      note: Screening criteria
    - source: investment-management-process-slides
      anchor: slide-13
      note: Initial call stage
    - source: investment-management-process-slides
      anchor: slide-14
      note: Initial call AI map
    - source: digital-worker-suite-index
      anchor: keyword-page-map
      note: Dealflow source material
    - source: atomic-agents
      anchor: worksheet-atomic-agents
      note: Spreadsheet rows 14, 22, 23
    - source: investment-management-process-slides
      anchor: slide-10
      note: Discovery AI map
    instructions:
      executionInstructions: 'Verify whether the created Deal Pipeline has enough supplied or approved source context to move
        into formal screening. Inspect project fields, task inputs, attached/source artifacts, source threads, founder materials,
        and approved CRM/source payloads such as `import_payload`. When an approved CRM/source payload is present, read only
        the approved source record scope needed to hydrate missing project fields and source provenance. Capture the source
        index, hydrated field map, missing information, and screening-readiness status. Do not run public-web research, Exa,
        Brave, SerpAPI, Firecrawl, competitor discovery, market research, investment scoring, red-flag analysis, or continue/watch/pass
        recommendations during intake; those belong in screening or later evaluation. Do not require a pitch deck when another
        supplied source explains the opportunity. Ask for the smallest missing context needed to identify the company and cite
        at least one source anchor. Create or update the required output field `opportunity_intake_artifact_id` by calling
        `artifact_createTextArtifact` directly. The artifact must be an HTML text artifact, not a Markdown/project file: use
        a `.html` filename, `mimeType: "text/html"`, and set `content` to complete standalone HTML source beginning with
        `<!doctype html>`. Do not create `.md` files, do not use `text/markdown`, and do not pass Markdown or prose for the
        platform to convert. Author the summary directly as safe static HTML with semantic sections and optional inline CSS
        in a `<style>` block. Do not include scripts, event handlers, external assets, forms, iframes, or interactive JavaScript.
        Include readiness status, source index, hydrated field map, missing information, and screening handoff notes in the
        HTML document. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by
        usage: `style_guide` governs citations and claim language, and `operating_guidance` constrains process and approval
        boundaries.'
      outputFormatting: 'Keep the HTML artifact separate from structured task output fields. `opportunity_intake_artifact_id`
        must contain only the returned artifact UUID. `intake_readiness_status` must contain only one status string:
        ready_for_screening, needs_more_info, or blocked. `hydrated_field_map`, `source_index`, and `missing_information`
        must be plain text with no HTML tags, no `<table>`, no `<tr>`, no `<td>`, and no escaped HTML. Use compact lines
        or numbered plain-text entries for those fields. HTML tables and semantic markup belong only inside the `.html`
        artifact content passed to `artifact_createTextArtifact`, never inside saved task output fields.'
      missingInputPolicy: If company identity and at least one credible supplied or approved source anchor are present, complete
        intake and list missing screening inputs instead of blocking. If identity, provenance, or approved source access is
        insufficient, ask for the minimum missing item such as company domain, deck, source thread, CRM/source record, founder
        material, or source artifact.
      externalActionPolicy: Intake readiness only. Approved CRM/source reads are allowed within the supplied scope. Public-web
        research, CRM writes, external sends, Drive changes, child task creation, project creation, and stage transitions are
        forbidden unless a human explicitly approves a separate workflow.
      completionCriteria:
      - Company identity is confirmed or the task is blocked with a specific clarification question.
      - At least one supplied or approved source anchor is recorded, or the missing source anchor is requested.
      - Hydrated project fields list provenance and confidence without using public-web enrichment.
      - Missing information names the smallest inputs needed before or during screening.
      - Intake readiness is reported as ready_for_screening, needs_more_info, or blocked.
    humanDecisionPoints:
    - Confirm the target company when source material is ambiguous.
    - Provide missing deck, CRM/source record, source thread, founder material, or source artifact when intake is not ready.
    - Approve final intake readiness before moving to screening.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
  - key: company_name
    name: Company Name
    fieldType: string
    required: false
    position: 0
    config: {}
  - key: import_payload
    name: Approved Source Import Payload
    fieldType: json
    required: false
    position: 1
    config:
      contractRef: vc.capture_opportunity_intake.import_payload.v1
  - key: pitch_deck_artifact_id
    name: Pitch Deck Artifact
    fieldType: file
    required: false
    position: 2
    config: {}
  - key: company_domain
    name: Company Domain
    fieldType: string
    required: false
    position: 3
    config: {}
  - key: source_system
    name: Source System
    fieldType: string
    required: false
    position: 4
    config: {}
  - key: source_object_url
    name: Source Object URL
    fieldType: string
    required: false
    position: 5
    config: {}
  - key: source_thread_url
    name: Source Thread URL
    fieldType: string
    required: false
    position: 6
    config: {}
  - key: source_thread_artifact_id
    name: Source Thread Artifact
    fieldType: file
    required: false
    position: 7
    config: {}
  - key: source_material_artifact_ids
    name: Source Material Artifacts
    fieldType: string
    required: false
    position: 8
    config: {}
  - key: founder_materials_artifact_ids
    name: Founder Materials Artifacts
    fieldType: string
    required: false
    position: 9
    config: {}
  - key: referrer
    name: Referrer
    fieldType: string
    required: false
    position: 10
    config: {}
  output:
  - key: opportunity_intake_artifact_id
    name: Opportunity Intake Readiness Summary
    fieldType: file
    required: true
    position: 0
    config: {}
  - key: intake_readiness_status
    name: Intake Readiness Status
    fieldType: string
    required: false
    position: 1
    config: {}
  - key: missing_information
    name: Missing Information
    fieldType: string
    required: false
    position: 2
    config: {}
  - key: hydrated_field_map
    name: Hydrated Field Map
    fieldType: richtext
    required: false
    position: 3
    config:
      rows: 8
  - key: source_index
    name: Source Index
    fieldType: richtext
    required: false
    position: 4
    config:
      rows: 6
