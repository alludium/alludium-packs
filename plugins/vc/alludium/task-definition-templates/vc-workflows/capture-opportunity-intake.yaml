      contractRef: vc.capture_opportunity_intake.import_payload.v1
  - key: pitch_deck_artifact_id
    name: Pitch Deck Artifact
    fieldType: file
    required: false
    position: 2
    config: {}
  - key: company_domain
    name: Company Domain
    fieldType: string
    required: false
    position: 3
    config: {}
  - key: source_system
    name: Source System
    fieldType: string
    required: false
    position: 4
    config: {}
  - key: source_object_url
    name: Source Object URL
    fieldType: string
    required: false
    position: 5
    config: {}
  - key: source_thread_url
    name: Source Thread URL
    fieldType: string
    required: false
    position: 6
    config: {}
  - key: source_thread_artifact_id
    name: Source Thread Artifact
    fieldType: file
    required: false
    position: 7
    config: {}
  - key: source_material_artifact_ids
    name: Source Material Artifacts
    fieldType: string
    required: false
    position: 8
    config: {}
  - key: founder_materials_artifact_ids
    name: Founder Materials Artifacts
    fieldType: string
    required: false
    position: 9
    config: {}
  - key: referrer
    name: Referrer
    fieldType: string
    required: false
    position: 10
    config: {}
  output:
  - key: opportunity_intake_artifact_id
    name: Opportunity Intake Readiness Summary
    fieldType: file
    required: false
    position: 0
    config: {}
  - key: intake_readiness_status
    name: Intake Readiness Status
    fieldType: string
    required: false
    position: 1
    config: {}
  - key: missing_information
    name: Missing Information
    fieldType: string
    required: false
    position: 2
    config: {}
  - key: hydrated_field_map
    name: Hydrated Field Map
    fieldType: richtext
    required: false
    position: 3
    config:
      rows: 8
  - key: source_index
    name: Source Index
    fieldType: richtext
    required: false
    position: 4
    config:
      rows: 6
