kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.capture_opportunity_intake
version: 1.0.19
title: Capture Opportunity Intake
category: Venture Capital
visibility: workspace
tags:
- vc
- intake
- enrichment
definition:
  name: Capture Opportunity Intake
  slug: capture-opportunity-intake
  description: Hydrate and assess a created Deal Pipeline from available source context before formal screening.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: intake
    taskFamily: intake
    documentRefs:
    - documentId: vc.document.deal_room_sop
      usage: operating_guidance
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - deal-pipeline-setup-and-source-ingestion
    - company-research-and-enrichment
    - citation-enforcement
    - pitch-deck-explainer
    plannedRecommendedAgentTemplate: vc_dealflow_concierge
    recommendedAgentTemplate: vc_dealflow_concierge
    supportedProjectTypes:
    - vc_deal_room
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-9
      note: Screening criteria
    - source: investment-management-process-slides
      anchor: slide-13
      note: Initial call stage
    - source: investment-management-process-slides
      anchor: slide-14
      note: Initial call AI map
    - source: digital-worker-suite-index
      anchor: keyword-page-map
      note: Dealflow source material
    - source: atomic-agents
      anchor: worksheet-atomic-agents
      note: Spreadsheet rows 14, 22, 23
    - source: investment-management-process-slides
      anchor: slide-10
      note: Discovery AI map
    instructions:
      executionInstructions: 'Hydrate the created Deal Pipeline from the best available source context: CRM/source record,
        company domain, pitch deck, intro note, source thread, founder material, origination promotion package, or other supplied
        evidence. Capture known project fields, source index, missing information, evidence quality, and recommended readiness
        for formal screening. Do not require a pitch deck when another source explains the opportunity. Cite material claims,
        separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child
        tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Opportunity
        Intake Summary and attach it to the required output field `opportunity_intake_artifact_id`. Use `definitionJson.documentRefs`
        as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton,
        `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner,
        `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval
        boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the
        document ID alongside the output artifact.'
      missingInputPolicy: Ask for the minimum missing context needed to identify the company and cite at least one source.
        If company identity and one credible source are present, complete intake and list missing enrichment or screening inputs
        instead of blocking.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, child task creation,
        or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
      - Intake recommendation clearly states whether the project is ready for screening, needs more context, should be watched,
        or should be passed.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
