definition:
  name: Verify Opportunity Intake
  slug: capture-opportunity-intake
  description: Verify that a Deal Pipeline has enough supplied or approved source context to move into screening.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: intake
    taskFamily: intake
    documentRefs:
    - documentId: vc.document.deal_room_sop
      usage: operating_guidance
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - deal-pipeline-intake-readiness
    - pitch-deck-explainer
    - citation-enforcement
    plannedRecommendedAgentTemplate: vc_intake_readiness_operator
    recommendedAgentTemplate: vc_intake_readiness_operator
    supportedProjectTypes:
    - vc_deal_room
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-9
      note: Screening criteria
    - source: investment-management-process-slides
      anchor: slide-13
      note: Initial call stage
    - source: investment-management-process-slides
      anchor: slide-14
      note: Initial call AI map
    - source: digital-worker-suite-index
      anchor: keyword-page-map
      note: Dealflow source material
    - source: atomic-agents
      anchor: worksheet-atomic-agents
      note: Spreadsheet rows 14, 22, 23
    - source: investment-management-process-slides
      anchor: slide-10
      note: Discovery AI map
    instructions:
      executionInstructions: 'Verify whether the created Deal Pipeline has enough supplied or approved source context to move
        into formal screening. Inspect project fields, task inputs, attached/source artifacts, source threads, founder materials,
        and approved CRM/source payloads such as `import_payload`. When an approved CRM/source payload is present, read only
        the approved source record scope needed to hydrate missing project fields and source provenance. When `source_system`
        and `source_object_url` identify a scoped CRM/source record such as an Affinity company or
        opportunity, treat that as an approved scoped read for that specific record. Resolve `source_object_url` to a tool
        call: if the URL path resembles `.../companies/<id>`, treat it as a company and read it with `affinity_get_company`
        using that ID; if it resembles `.../lists/<id>` or a list-entry path, read it with `affinity_get_list_entries`;
        otherwise treat it as an opportunity and read it with `affinity_get_opportunity`. If the URL cannot be parsed or the
        direct read returns nothing, confirm the record with
        `affinity_search_companies` using the confirmed company identity before reading, rather than completing from the URL
        string. Read the record and hydrate available fields with provenance before assessing readiness. A
        source anchor that is recorded
        but not read does not count as inspected: do not mark fields missing, set readiness, or create an artifact on the
        basis of a CRM/source URL whose record has not actually been read. If the required CRM/source read tool is unavailable
        or the connection is inactive, do not complete intake from the URL string; stop and ask the user to connect the source,
        approve the read, supply an export/snapshot, or run the appropriate import task. Capture the source
        index, hydrated field map, missing information, and screening-readiness status. Do not run public-web research, Exa,
        Brave, SerpAPI, Firecrawl, competitor discovery, market research, investment scoring, red-flag analysis, or continue/watch/pass
        recommendations during intake; those belong in screening or later evaluation. Do not require a pitch deck when another
        supplied source explains the opportunity. When `pitch_deck_artifact_id` is present, inspect, extract, search, or route
        the deck through `pitch-deck-explainer` before using it as evidence or declaring deck-contained fields missing. Deck
        presence alone is not evidence. If the deck cannot be inspected with available tools, mark it as unreadable, do not
        count it as satisfying source readiness, and ask for a readable deck, extracted text, an approved extraction path, or
        manual field values before saving a final readiness artifact. Ask for the smallest missing context needed to identify
        the company and cite at least one source anchor. If identity or source anchoring is insufficient, do not create or save an
        `opportunity_intake_artifact_id`; use task chat/questions to request the missing item and keep the intake state
        interactive. Create or update `opportunity_intake_artifact_id` only after at least one supplied or approved source
        anchor has been inspected, or when a human explicitly approves a partial artifact with gaps. When an artifact is
        allowed, call `artifact_createTextArtifact` directly. The artifact must be an HTML text artifact, not a Markdown/project
        file: use a `.html` filename, `mimeType: "text/html"`, and set `content` to complete standalone HTML source beginning
        with `<!doctype html>`. Do not create `.md` files, do not use `text/markdown`, and do not pass Markdown or prose for
        the platform to convert. Author the summary directly as safe static HTML with semantic sections and optional inline
        CSS in a `<style>` block. Do not include scripts, event handlers, external assets, forms, iframes, or interactive
        JavaScript. Start the HTML body with a compact "At a glance" overview that surfaces company identity, readiness
        status, source confidence, top missing inputs, and the screening handoff recommendation before any detailed tables.
        Style the overview as a concise static card or summary table so the first screen is decision-useful. Include readiness
        status, source index, hydrated field map, missing information, and screening handoff notes in the HTML document. Use
        `definitionJson.documentRefs` as the durable document reference contract. Apply each
        reference by usage: `style_guide` governs citations and claim language, and `operating_guidance` constrains process
        and approval boundaries.'
      outputFormatting: 'Keep the HTML artifact separate from structured task output fields. `opportunity_intake_artifact_id`
        must be omitted when no artifact is created and must contain only the returned artifact UUID when present.
        `intake_readiness_status` must contain only one status string:
        ready_for_screening, needs_more_info, or blocked. `hydrated_field_map`, `source_index`, and `missing_information`
        must be plain text with no HTML tags, no `<table>`, no `<tr>`, no `<td>`, and no escaped HTML. Use compact lines
        or numbered plain-text entries for those fields. HTML tables and semantic markup belong only inside the `.html`
        artifact content passed to `artifact_createTextArtifact`, never inside saved task output fields.'
      missingInputPolicy: If company identity and at least one credible supplied or approved source anchor that has actually
        been inspected are present, complete intake and list missing screening inputs instead of blocking. A recorded but
        unread source anchor, such as a supplied CRM/source URL whose record was never read or an attached deck whose contents
        were never inspected, does not satisfy this bar. If identity, provenance, or approved source access is insufficient,
        or a supplied CRM/source record or deck cannot be read with the available tools, ask for the minimum missing item such
        as connecting/approving the CRM/source, a company domain, readable deck or extracted deck text, source thread,
        CRM/source record, founder material, or source artifact. If a pitch deck is attached but unreadable, do not treat the
        deck artifact ID as a credible source anchor until its contents have been inspected or a human explicitly approves a
        partial artifact with gaps.
      externalActionPolicy: Intake readiness only. Approved CRM/source reads are allowed within the supplied scope. Public-web
        research, CRM writes, external sends, Drive changes, child task creation, project creation, and stage transitions are
        forbidden unless a human explicitly approves a separate workflow.
      completionCriteria:
      - Company identity is confirmed or the task is blocked with a specific clarification question.
      - At least one supplied or approved source anchor is recorded before an intake artifact is created, or the missing source
        anchor is requested without creating an artifact.
      - Any supplied CRM/source record anchor is read with an available tool before readiness or missing fields are decided, or
        the user is asked to connect/approve the source or supply an export when the record cannot be read.
      - Any attached pitch deck is inspected and cited, or recorded as unreadable and excluded from readiness evidence.
      - Hydrated project fields list provenance and confidence without using public-web enrichment.
      - Missing information names the smallest inputs needed before or during screening.
      - Intake readiness is reported as ready_for_screening, needs_more_info, or blocked.
    humanDecisionPoints:
    - Confirm the target company when source material is ambiguous.
    - Provide missing deck, CRM/source record, source thread, founder material, or source artifact when intake is not ready.
    - Approve final intake readiness before moving to screening.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
