kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.request_founder_materials
version: 1.0.14
title: Request Founder Materials
category: Venture Capital
visibility: workspace
tags:
  - vc
  - intake
  - founder-materials
definition:
  name: Request Founder Materials
  slug: request-founder-materials
  description: Request Founder Materials for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: evaluation
    taskFamily: deal_room
    documentRefs:
      - documentId: vc.document.founder_materials_request_template
        usage: output_template
        outputFieldKey: founder_materials_request_artifact_id
      - documentId: vc.document.file_naming_source_index_sop
        usage: operating_guidance
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - citation-enforcement
      - founder-materials-request
    plannedRecommendedAgentTemplate: vc_dealflow_concierge
    recommendedAgentTemplate: vc_dealflow_concierge
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-16
        note: Follow-up AI map
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 16
    instructions:
      executionInstructions: >-
        Prepare the missing-materials checklist, founder-friendly request draft, share instructions, and due-date recommendation for human approval before sending. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Founder Materials Request as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use `project.instantiateTemplate` or create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `founder_materials_request_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
    - key: company_name
      name: Company Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: missing_materials
      name: Missing Materials
      fieldType: string
      required: true
      position: 1
      config: {}
    - key: founder_contact
      name: Founder Contact
      fieldType: string
      required: false
      position: 2
      config: {}
    - key: due_date
      name: Due Date
      fieldType: string
      required: false
      position: 3
      config: {}

  output:
    - key: founder_materials_request_artifact_id
      name: Founder Materials Request
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.founder_materials_request_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: request_founder_materials
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_dealflow_concierge
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
