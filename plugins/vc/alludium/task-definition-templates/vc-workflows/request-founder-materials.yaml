kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.request_founder_materials
version: 1.0.1
title: Request Founder Materials
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - intake
  - founder-materials
definition:
  name: Request Founder Materials
  slug: request-founder-materials
  description: Request Founder Materials for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: screening
    taskFamily: deal_room
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - founder-materials-request
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_dealflow_concierge
    recommendedAgentTemplate: vc_dealflow_concierge
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-16
        note: Follow-up AI map
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 16
    instructions:
      executionInstructions: Prepare the missing-materials checklist, founder-friendly request draft, share instructions, and due-date recommendation for human approval before sending. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
