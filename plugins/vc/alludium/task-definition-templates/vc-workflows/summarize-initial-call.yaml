kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.summarize_initial_call
version: 1.0.2
title: Summarize Initial Call
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - initial-call
  - summary
definition:
  name: Summarize Initial Call
  slug: summarize-initial-call
  description: Summarize Initial Call for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: initial_call
    taskFamily: meeting
    requiredSkills:
      - meeting-prep-and-summary
      - citation-enforcement
    plannedRequiredSkills:
      - meeting-prep-and-summary
      - vc-task-and-next-step-generation
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_meeting_operator
    recommendedAgentTemplate: vc_meeting_operator
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-14
        note: Initial call AI map
    instructions:
      executionInstructions: Summarize the initial call, extract claims and gaps, capture action items, draft a CRM-neutral update, and recommend pass or follow-up. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it.
      missingInputPolicy: Require meeting_transcript_url, company_name, and deal_room_url before producing the call summary. Use meeting_notes as optional supporting context when provided.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: ten-factor-evaluation
        note: Use only when the workspace explicitly configures this screening framework.
