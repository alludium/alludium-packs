kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.promote_candidate_to_deal_room
version: 0.1.9
title: Promote Candidate to Deal Pipeline
category: Venture Capital
visibility: workspace
tags:
- vc
- origination
- promotion
- deal-room
definition:
  name: Promote Candidate to Deal Pipeline
  slug: promote-candidate-to-deal-room
  description: Prepare a reviewed promotion package for creating or updating a Deal Pipeline from an approved origination
    candidate.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: promote
    taskFamily: origination_promotion
    documentRefs:
    - documentId: vc.document.promotion_package_template
      usage: output_template
      outputFieldKey: promotion_package_artifact_id
    - documentId: vc.document.origination_source_strategy_guide
      usage: methodology
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - vc-origination-deal-room-promotion
    - citation-enforcement
    - deal-room-setup-and-source-ingestion
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
    - vc_origination_pipeline
    supportedProjectScopes:
    - project_instance
    instructions:
      executionInstructions: 'Promote only human-approved candidates. Prepare a Deal Pipeline creation/update package with
        company identity, founder evidence, source receipts, enrichment/verdict/screen summaries, relationship context, outreach
        state, and open questions. Do not create or update the Deal Pipeline unless the platform action is explicitly approved.
        Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template`
        sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status,
        evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains
        process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document
        and preserve the document ID alongside the output artifact.'
      missingInputPolicy: Ask for approved candidate, target Deal Pipeline policy, promotion threshold evidence, owner, and
        required source artifacts.
      externalActionPolicy: Promotion package by default. Deal Pipeline creation/update, CRM changes, document creation, and
        notifications require separate explicit approval.
      humanConfirmationPolicy: always_before_project_creation_or_external_write
      completionCriteria:
      - Promotion package includes source receipts, candidate evidence, recommended initial Deal Pipeline state, required
        tasks, owner, and unresolved risks.
      - Human approval boundary for project creation/update is explicit.
fields:
  input:
  - key: promotion_candidate
    name: Promotion Candidate
    fieldType: json
    required: true
    position: 0
    config: {}
  output:
  - key: promotion_package_artifact_id
    name: Promotion Package Artifact
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.promotion_package_template
  - key: promoted_candidate_key
    name: Promoted Candidate Key
    fieldType: string
    required: false
    position: 1
    config: {}
  - key: promotion_summary
    name: Promotion Summary
    fieldType: richtext
    required: false
    position: 2
    config:
      rows: 8
