kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_outreach_draft_queue
version: 0.1.8
title: Prepare Outreach Draft Queue
category: Venture Capital
visibility: workspace
tags:
  - vc
  - origination
  - outreach
definition:
  name: Prepare Outreach Draft Queue
  slug: prepare-outreach-draft-queue
  description: Draft founder outreach notes for active candidates while leaving send decisions to humans.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: engage
    taskFamily: origination_outreach_drafts
    documentRefs:
      - documentId: vc.document.outreach_queue_template
        usage: output_template
        outputFieldKey: outreach_queue_artifact_id
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - vc-outreach-draft-queue
      - citation-enforcement
      - founder-outreach-and-intro-paths
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
      - vc_origination_pipeline
    supportedProjectScopes:
      - project_instance
    scheduleDefaults:
      enabledByDefault: false
      requiresHumanApprovalToEnable: true
      cadence: daily
      localTime: "08:30"
      dryRunFirst: true
    scheduling:
      schedulable: true
      showInProjectSetup: true
      setupStep: schedules
      scheduleType: cron
      defaultScheduleRef: scheduleDefaults
      requiresHumanApprovalToEnable: true
      canCreateTestRun: true
      testRunCreatesVisibleTask: true
      dryRunFirst: true
      safety:
        externalWritesRequireApproval: true
    instructions:
      executionInstructions: >-
        Mirror the reference pipeline's outreach draft policy. Draft only for candidates with active actions such as Meet, IC-Summary, or Reach out, no manual Status/contact progress, and a founder LinkedIn URL. Produce short, specific, question-led LinkedIn connection notes tied to evidence. Skip weak hooks instead of fabricating personalization. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for active candidate batch, founder profile URL, eligible actions, manual-contact status, outreach tone policy, and destination for drafts.
      externalActionPolicy: Draft only. Do not send messages, insert browser-extension notes, mark outreach as sent, or update external systems without explicit human approval.
      completionCriteria:
        - Draft queue includes founder, profile URL, note, angle, strength, skip reason, and source evidence.
        - Notes are short, question-led, specific, and free of unsupported praise or editorializing.
        - Send remains a human action.
fields:
  input:
    - key: outreach_scope
      name: Outreach Scope
      fieldType: json
      required: true
      position: 0
      config: {}
  output:
    - key: outreach_queue_artifact_id
      name: Outreach Queue Artifact
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.outreach_queue_template
    - key: outreach_draft_count
      name: Outreach Draft Count
      fieldType: number
      required: false
      position: 1
      config: {}
    - key: outreach_report
      name: Outreach Report
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 8
