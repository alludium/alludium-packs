kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_commercial_evaluation
version: 0.1.2
title: Run Commercial Evaluation
category: Venture Capital
visibility: workspace
tags:
  - vc
  - evaluation
  - commercial
definition:
  name: Run Commercial Evaluation
  slug: run-commercial-evaluation
  description: Run an evaluation-stage commercial workstream for one venture-capital opportunity, identifying market/customer evidence, GTM risk, and next proof needed before formal diligence.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: evaluation
    taskFamily: evaluation
    documentRefs:
      - documentId: vc.document.commercial_evaluation_template
        usage: output_template
        outputFieldKey: commercial_evaluation_artifact_id
      - documentId: vc.document.evaluation_workstream_guide
        usage: methodology
      - documentId: vc.document.commercial_evaluation_guide
        usage: methodology
      - documentId: vc.document.opportunity_evaluation_framework
        usage: methodology
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - commercial-evaluation-and-market-risk
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_evaluation_analyst
    recommendedAgentTemplate: vc_evaluation_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-35
        note: structured diligence dimensions
    instructions:
      executionInstructions: >-
        Run a commercial evaluation covering customer segment, pain urgency, budget, pricing, GTM path, competition, lightweight market sizing, and commercial gating risk. Use this as evaluation-stage work, not formal commercial diligence. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Commercial Evaluation as a standalone safe static HTML artifact using `artifact_createTextArtifact`, a `.html` filename, and `mimeType: "text/html"`; then attach it to the required output field `commercial_evaluation_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for the company name and at least one relevant source such as a deck, screen, call notes, customer evidence, pricing context, GTM notes, pipeline evidence, or market source before producing the evaluation.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: market-map-building
        note: Use only when the workspace explicitly configures this market mapping method.
fields:
  input:
    - key: company_name
      name: Company Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: follow_up_evaluation_artifact_id
      name: Opportunity Evaluation
      fieldType: file
      required: false
      position: 1
      config: {}
    - key: opportunity_evidence_artifact_ids
      name: Opportunity Evidence Artifacts
      fieldType: json
      required: false
      position: 2
      config: {}
    - key: customer_or_market_evidence
      name: Customer Or Market Evidence
      fieldType: json
      required: false
      position: 3
      config: {}

  output:
    - key: commercial_evaluation_artifact_id
      name: Commercial Evaluation
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.commercial_evaluation_template
    - key: main_commercial_hypothesis
      name: Main Commercial Hypothesis
      fieldType: richtext
      required: false
      position: 1
      config:
        rows: 5
    - key: commercial_gating_risk
      name: Commercial Gating Risk
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 5
    - key: next_commercial_proof_needed
      name: Next Commercial Proof Needed
      fieldType: richtext
      required: false
      position: 3
      config:
        rows: 5
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: run_commercial_evaluation
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_evaluation_analyst
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
