  - conditions-precedent
definition:
  name: Verify Conditions Precedent
  slug: verify-conditions-precedent
  description: Verify Conditions Precedent for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: closing
    taskFamily: closing
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - closing-coordination-and-cp-tracking
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-31
        note: Closing process
      - source: investment-management-process-slides
        anchor: slide-32
        note: Term sheet/legal execution
      - source: investment-management-process-slides
        anchor: slide-33
        note: Closing AI map
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet rows 62, 68-69
    instructions:
      executionInstructions: Map conditions precedent to evidence, identify missing items and blocker severity, and prepare counsel review recommendation and signing readiness. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use the required input file artifact `closing_checklist_artifact_id` as the closing checklist subject for conditions-precedent verification. Create or update a durable project file artifact named Conditions Precedent Verification and attach it to the required output field `conditions_precedent_verification_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
