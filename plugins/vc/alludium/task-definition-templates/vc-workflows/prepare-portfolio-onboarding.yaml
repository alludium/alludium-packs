kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_portfolio_onboarding
version: 1.0.13
title: Prepare Portfolio Onboarding
category: Venture Capital
visibility: workspace
tags:
- vc
- portfolio
- onboarding
definition:
  name: Prepare Portfolio Onboarding
  slug: prepare-portfolio-onboarding
  description: Prepare Portfolio Onboarding for one venture-capital opportunity with evidence capture, human review gates,
    and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: closing
    taskFamily: onboarding
    documentRefs:
    - documentId: vc.document.portfolio_onboarding_plan_template
      usage: output_template
      outputFieldKey: portfolio_onboarding_plan_artifact_id
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - citation-enforcement
    - portfolio-onboarding-and-100-day-plan
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
    - vc_investment_management
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-31
      note: Closing process
    - source: investment-management-process-slides
      anchor: slide-32
      note: Term sheet/legal execution
    - source: investment-management-process-slides
      anchor: slide-33
      note: Closing AI map
    - source: investment-management-process-slides
      anchor: slide-41
      note: Historic/post-investment risks
    instructions:
      executionInstructions: 'Prepare the portfolio handoff with board setup notes, reporting cadence, 100-day plan, milestones,
        support request intake, and owner assignments. Cite material claims, separate assumptions from evidence, and do not
        send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human
        approval. Use the required input file artifacts `ic_decision_record_artifact_id`, `closing_checklist_artifact_id`,
        and `conditions_precedent_verification_artifact_id` as source artifacts for the portfolio onboarding plan. Create
        or update a durable project file artifact named Portfolio Onboarding Plan and attach it to the required output field
        `portfolio_onboarding_plan_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract.
        Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis
        logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language,
        and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce
        that output from the referenced pack document and preserve the document ID alongside the output artifact.'
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation,
        child task creation, or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
fields:
  input:
  - key: ic_decision_record_artifact_id
    name: IC Decision Record
    fieldType: file
    required: true
    position: 0
    config: {}
  - key: closing_checklist_artifact_id
    name: Closing Checklist
    fieldType: file
    required: true
    position: 1
    config: {}
  - key: conditions_precedent_verification_artifact_id
    name: Conditions Precedent Verification
    fieldType: file
    required: true
    position: 2
    config: {}
  - key: completion_tracker_artifact_id
    name: Completion Tracker
    fieldType: file
    required: false
    position: 3
    config: {}
  output:
  - key: portfolio_onboarding_plan_artifact_id
    name: Portfolio Onboarding Plan
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.portfolio_onboarding_plan_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: prepare_portfolio_onboarding
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_legal_compliance_desk
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
