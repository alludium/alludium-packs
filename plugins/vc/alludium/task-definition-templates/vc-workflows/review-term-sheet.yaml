      name: Term Sheet Artifact
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: deal_terms
      name: Deal Terms
      fieldType: json
      required: true
      position: 1
      config: {}
    - key: standard_terms_reference
      name: Standard Terms Reference
      fieldType: json
      required: false
      position: 2
      config: {}
    - key: counsel_notes
      name: Counsel Notes
      fieldType: richtext
      required: false
      position: 3
      config:
        rows: 5
    - key: deal_terms_analysis_artifact_id
      name: Deal Terms Analysis
      fieldType: file
      required: false
      position: 4
      config: {}

  output:
    - key: term_sheet_review_artifact_id
      name: Term Sheet Review
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.term_sheet_review_template
    - key: term_summary
      name: Term Summary
      fieldType: richtext
      required: false
      position: 1
      config:
        rows: 5
    - key: deviation_table
      name: Deviation Table
      fieldType: string
      required: false
      position: 2
      config: {}
    - key: review_focus
      name: Review Focus
      fieldType: multiselect
      required: false
      position: 3
      config:
        options:
          - economics
          - governance
          - control_rights
          - information_rights
          - liquidation_preferences
    - key: deal_room_url
      name: Deal Room URL
      fieldType: string
      required: false
      position: 4
      config: {}
    - key: recommendation
      name: Recommendation
      fieldType: select
      required: false
      position: 5
      config:
        options:
          - approve
          - reject
          - request_changes
    - key: review_notes
      name: Review Notes
      fieldType: richtext
      required: false
      position: 6
      config: {}
    - key: red_flags
