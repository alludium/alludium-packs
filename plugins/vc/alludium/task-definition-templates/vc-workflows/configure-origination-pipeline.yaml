kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.configure_origination_pipeline
version: 0.1.9
title: Configure VC Origination Pipeline
category: Venture Capital
visibility: workspace
tags:
  - vc
  - origination
  - setup
  - configuration
definition:
  name: Configure VC Origination Pipeline
  slug: configure-origination-pipeline
  description: Capture thesis, source selection, cadence intent, budget policy, review thresholds, and integration-readiness requirements for a VC origination pipeline.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: setup
    taskFamily: origination_pipeline_setup
    documentRefs:
      - documentId: vc.document.origination_pipeline_sop
        usage: operating_guidance
      - documentId: vc.document.source_registry_template
        usage: operating_guidance
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - vc-origination-pipeline-orchestration
      - citation-enforcement
    recommendedAgentTemplate: vc_pipeline_autopilot
    plannedRecommendedAgentTemplate: vc_pipeline_autopilot
    supportedProjectTypes:
      - vc_origination_pipeline
    supportedProjectScopes:
      - project_instance
    instructions:
      executionInstructions: >-
        Guide the user through initial origination pipeline configuration. Capture the required `pipeline_name`, thesis, source choices, cadence intent, digest destination, budget, review policy, promotion threshold, manual-review threshold, credential gaps, and child setup tasks needed for selected sources. Create setup child tasks only for selected integrations whose setup templates exist. Complete with structured output `projectCreation.fieldValues.pipeline_name`, include `projectCreation.fieldValues.source_registry` and `projectCreation.fieldValues.review_policy` when captured, and include `projectCreation.fieldValues.confidentiality_level` only when confidently captured. Do not run sourcing, score candidates, create candidate records, enable schedules, write to external systems, send outreach, create Deal Rooms, or create the Origination Pipeline project; the platform finalizer owns deterministic project creation after task completion. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Keep setup incomplete when thesis, enabled sources, review policy, budget policy, or required credential decisions are missing. Ask targeted task questions rather than inventing configuration.
      externalActionPolicy: Configuration only. No external reads beyond connection-readiness checks, no scheduled runs, no imports, no external writes, no outreach, and no Deal Room creation.
      humanConfirmationPolicy: always
      completionCriteria:
        - "`pipeline_name` is captured for guided project creation finalization."
        - Thesis, source selection, run cadence intent, budget policy, review policy, and thresholds are captured or explicitly marked unresolved.
        - Required setup child tasks for selected Apify and Companies House sources are proposed without executing source reads.
        - Credential gaps and approved connection scopes are listed.
        - The output distinguishes configuration intent from active automation.
        - "Guided project creation output includes `projectCreation.fieldValues.pipeline_name` and captured runtime project fields such as `source_registry` and `review_policy`."
    humanDecisionPoints:
      - Choose enabled source systems and approved source scope.
      - Confirm budget and cadence intent before any later scheduled-run work.
      - Approve child setup tasks separately for each integration.
fields:
  input:
    - key: pipeline_name
      name: Pipeline Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: configuration_goal
      name: Configuration Goal
      fieldType: string
      required: false
      position: 1
      config: {}
    - key: current_pipeline_context
      name: Current Pipeline Context
      fieldType: json
      required: false
      position: 2
      config: {}
  output:
    - key: configuration_summary
      name: Configuration Summary
      fieldType: richtext
      required: false
      position: 0
      config:
        rows: 8
    - key: source_registry
      name: Source Registry
      fieldType: richtext
      required: false
      position: 1
      config:
        rows: 6
    - key: review_policy
      name: Review Policy
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 6
    - key: child_task_plan
      name: Child Task Plan
      fieldType: richtext
      required: true
      position: 3
      config:
        rows: 6
    - key: projectCreation
      name: Project Creation Field Values
      fieldType: json
      required: true
      position: 4
      config:
        contractRef: projectCreation.fieldValues.v1
        requiredPaths:
          - fieldValues.pipeline_name
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc
      taskKind: configure_origination_pipeline
      projectType: vc_origination_pipeline
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    preferredMode: guided_configuration
    requiresHumanConfirmationToComplete: true
