      fieldType: file
      required: false
      position: 2
      config: {}
    - key: referrer
      name: Referrer
      fieldType: string
      required: false
      position: 3
      config: {}

  output:
    - key: opportunity_intake_artifact_id
      name: Opportunity Intake Summary
      fieldType: file
      required: true
      position: 0
      config: {}
    - key: fit_recommendation
      name: Intake Recommendation
      fieldType: string
      required: false
      position: 1
      config: {}
    - key: initial_investment_screen_summary
      name: Intake Summary
      fieldType: richtext
      required: false
      position: 2
      config:
        rows: 5
    - key: missing_information
      name: Missing Information
      fieldType: string
      required: false
      position: 3
      config: {}
    - key: red_flags
      name: Early Red Flags
      fieldType: string
      required: false
      position: 4
      config: {}
    - key: pass_feedback_draft
      name: Pass Feedback Draft
      fieldType: string
      required: false
      position: 5
      config: {}
    - key: next_actions
      name: Next Actions
      fieldType: json
      required: false
      position: 6
      config: {}
    - key: summary
      name: Summary
      fieldType: richtext
      required: false
      position: 7
      config:
        rows: 5
    - key: recommendation
      name: Recommendation
      fieldType: string
      required: false
      position: 8
      config: {}
    - key: source_links
      name: Source Links
      fieldType: string
      required: false
      position: 9
      config: {}
    - key: assumptions
      name: Assumptions
      fieldType: string
      required: false
      position: 10
      config: {}
    - key: evidence_quality
      name: Evidence Quality
      fieldType: json
      required: false
      position: 11
      config: {}
    - key: open_questions
      name: Open Questions
      fieldType: json
      required: false
      position: 12
      config: {}
    - key: risks
      name: Risks
      fieldType: json
      required: false
      position: 13
      config: {}
    - key: human_decision_points
      name: Human Decision Points
      fieldType: string
      required: false
      position: 14
      config: {}
    - key: projectCreation
      name: Project Creation Field Values
      fieldType: json
      required: true
      position: 15
      config:
        contractRef: projectCreation.fieldValues.v1
        requiredPaths:
          - fieldValues.company_name
runtime:
