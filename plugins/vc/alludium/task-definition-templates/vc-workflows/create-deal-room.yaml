kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.create_deal_room
version: 1.0.1
title: Create Deal Room
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - intake
  - deal-room
definition:
  name: Create Deal Room
  slug: create-deal-room
  description: Create Deal Room for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: intake
    taskFamily: deal_room
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - deal-room-setup-and-source-ingestion
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_dealflow_concierge
    recommendedAgentTemplate: vc_dealflow_concierge
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: digital-worker-suite-index
        anchor: page-4
        note: Source assumptions
      - source: digital-worker-suite-index
        anchor: page-5
        note: Source systems
      - source: digital-worker-suite-index
        anchor: page-7
        note: Workflow vision
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet rows 12-13
      - source: digital-worker-suite-index
        anchor: page-6
        note: Source workflow context
    instructions:
      executionInstructions: Prepare a reviewable per-opportunity Deal Room setup plan, CRM-neutral typed fields, artifact checklist, source index, Drive folder plan, manual Deal Room link capture, and next-stage recommendations. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    operatingMode: per_opportunity_setup_plan
    manualFallback: Capture manual Deal Room URL and produce a reviewable setup plan until vc_deal_room project-type automation exists.
    outOfScope:
      - Workspace-level VC asset setup
      - Automatic project-type creation
      - Automatic Drive folder or CRM record creation
    slugReview: Investigate whether create-deal-room should be renamed before launch to avoid confusion with workspace setup/configuration tasks.
