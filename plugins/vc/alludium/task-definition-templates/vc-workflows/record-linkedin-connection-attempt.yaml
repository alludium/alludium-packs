kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.record_linkedin_connection_attempt
version: 0.1.1
title: Record LinkedIn Connection Attempt
category: Venture Capital
visibility: workspace
tags:
- vc
- origination
- outreach
- linkedin
definition:
  name: Record LinkedIn Connection Attempt
  slug: record-linkedin-connection-attempt
  description: Capture a human-approved LinkedIn connection attempt and update the outbound state without sending messages
    automatically.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: connecting_on_linkedin
    taskFamily: origination_outbound_state
    documentRefs:
    - documentId: vc.document.outreach_queue_template
      usage: output_template
      outputFieldKey: connection_record_artifact_id
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - vc-outreach-draft-queue
    - founder-outreach-and-intro-paths
    - citation-enforcement
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
    - vc_origination_pipeline
    supportedProjectScopes:
    - project_instance
    instructions:
      executionInstructions: 'Record only a connection attempt that a human has already approved or sent. Capture the founder
        profile, sent note, sent-at date, source candidate, destination CRM/list state, and any manual owner notes. Mirror
        the reference outbound pattern: the task may prepare an update plan for the outreach state, but it must not send a
        LinkedIn request, mutate CRM records, or mark outreach as sent without explicit human approval. Use `definitionJson.documentRefs`
        as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton,
        `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner,
        `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval
        boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the
        document ID alongside the output artifact.'
      missingInputPolicy: Ask for the approved outreach target, LinkedIn profile URL, connection note, sent/approval status,
        owner, and destination system before recording.
      externalActionPolicy: Record and propose state updates only. Sending LinkedIn requests, setting CRM stages, or changing
        external status requires explicit human approval.
      completionCriteria:
      - Connection attempt record includes target, founder profile URL, note, date, owner, and source candidate reference.
      - Recommended next state distinguishes pending connection from ready-for-initial-LinkedIn-reachout.
      - External writes and message sending remain explicitly human-controlled.
fields:
  input:
  - key: connection_attempt
    name: Connection Attempt
    fieldType: json
    required: true
    position: 0
    config: {}
  output:
  - key: connection_record_artifact_id
    name: Connection Record Artifact
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.outreach_queue_template
  - key: outbound_status
    name: Outbound Status
    fieldType: string
    required: false
    position: 1
    config: {}
