kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_initial_call
version: 1.0.10
title: Prepare Initial Call
category: Venture Capital
visibility: workspace
tags:
  - vc
  - initial-call
  - meeting
definition:
  name: Prepare Initial Call
  slug: prepare-initial-call
  description: Prepare Initial Call for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: assessment
    taskFamily: meeting
    documentRefs:
      - documentId: vc.document.initial_call_brief_template
        usage: output_template
        outputFieldKey: initial_call_brief_artifact_id
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - meeting-prep-and-summary
      - company-research-and-enrichment
      - citation-enforcement
    plannedRequiredSkills:
      - meeting-prep-and-summary
      - company-research-and-enrichment
      - pitch-deck-explainer
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_meeting_operator
    recommendedAgentTemplate: vc_meeting_operator
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-13
        note: Initial call stage
      - source: investment-management-process-slides
        anchor: slide-14
        note: Initial call AI map
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 15
    instructions:
      executionInstructions: >-
        Prepare the first-call brief, founder and company summary, competitor and funding activity, starter Initial investment screen scorecard, and questions by topic. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named Initial Call Brief and attach it to the required output field `initial_call_brief_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: investment-screening-framework
        note: Use only when the workspace explicitly configures this screening framework.
