kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.summarize_meeting_records
version: 1.0.17
title: Summarize Meeting Records
category: Venture Capital
visibility: workspace
tags:
- vc
- summary
- meeting-records
definition:
  name: Summarize Meeting Records
  slug: summarize-meeting-records
  description: Summarize or ingest meeting records for one venture-capital opportunity with evidence capture, human review
    gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: evaluation
    taskFamily: meeting
    documentRefs:
    - documentId: vc.document.customer_insights_summary_template
      usage: output_template
      outputFieldKey: customer_insights_artifact_id
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - meeting-prep-and-summary
    - citation-enforcement
    - vc-task-and-next-step-generation
    plannedRecommendedAgentTemplate: vc_meeting_operator
    recommendedAgentTemplate: vc_meeting_operator
    supportedProjectTypes:
    - vc_deal_room
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-14
      note: Initial call AI map
    instructions:
      executionInstructions: 'Summarize or ingest the available meeting records for this opportunity, including founder, management,
        advisor, customer, expert, partner, IC, legal, or closing meetings represented by transcript artifacts, meeting-summary
        artifacts, recording exports, notes, or meeting-source links. Extract claims and gaps, capture action items, draft
        a CRM-neutral update, identify open questions, and recommend next actions or stage considerations without moving the
        deal. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create
        folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring
        frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default
        unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named Meeting
        Records Summary as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use the Project Instantiate Template tool, `project.instantiateTemplate`, or `project_instantiateTemplate`, and do not create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `customer_insights_artifact_id`. Use `definitionJson.documentRefs`
        as the durable document reference contract. Apply each reference by usage: `output_template` sets the output skeleton,
        `methodology` supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner,
        `style_guide` governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval
        boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the
        document ID alongside the output artifact.'
      missingInputPolicy: Require meeting_record_artifact_ids and company_name before producing the meeting summary. Use meeting_notes
        as optional supporting context when provided.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation,
        child task creation, or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
    - skill: investment-screening-framework
      note: Use only when the workspace explicitly configures this screening framework.
fields:
  input:
  - key: meeting_record_artifact_ids
    name: Meeting Record Artifact IDs
    fieldType: string
    required: true
    position: 0
    config: {}
  - key: meeting_notes
    name: Meeting Notes
    fieldType: richtext
    required: false
    position: 1
    config:
      rows: 5
  - key: company_name
    name: Company Name
    fieldType: string
    required: true
    position: 2
    config: {}
  - key: deal_room_url
    name: Deal Pipeline Url
    fieldType: string
    required: false
    position: 3
    config: {}
  output:
  - key: customer_insights_artifact_id
    name: Meeting Records Summary
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.customer_insights_summary_template
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: summarize_initial_call
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_meeting_operator
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
