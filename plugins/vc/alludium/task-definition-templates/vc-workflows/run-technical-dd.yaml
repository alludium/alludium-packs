kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_technical_dd
version: 1.0.2
title: Run Technical DD
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - diligence
  - technical
definition:
  name: Run Technical DD
  slug: run-technical-dd
  description: Run Technical DD for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: diligence
    taskFamily: diligence
    requiredSkills:
      - team-and-hiring-assessment
      - red-flags-scanner
      - citation-enforcement
    plannedRequiredSkills:
      - technical-diligence-workstream
      - team-and-hiring-assessment
      - red-flags-scanner
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-22
        note: DD workstreams
      - source: investment-management-process-slides
        anchor: slide-24
        note: Technical DD AI map
      - source: investment-management-process-slides
        anchor: slide-40
        note: DD timeline
    instructions:
      executionInstructions: Run technical diligence covering architecture, product, engineering team, IP and licensing, AI/ML risks, scalability, security, and technical scorecard. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Create or update a durable project file artifact named Technical DD Report and attach it to the required output field `technical_dd_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
