kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.prepare_initial_linkedin_reachout
version: 0.1.1
title: Prepare Initial LinkedIn Reachout
category: Venture Capital
visibility: workspace
tags:
- vc
- origination
- outreach
- linkedin
definition:
  name: Prepare Initial LinkedIn Reachout
  slug: prepare-initial-linkedin-reachout
  description: Draft the first LinkedIn message after a candidate has been approved for outbound engagement.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: initial_reachout_linkedin
    taskFamily: origination_outreach_drafts
    documentRefs:
    - documentId: vc.document.outreach_queue_template
      usage: output_template
      outputFieldKey: initial_linkedin_reachout_artifact_id
    - documentId: vc.document.origination_source_strategy_guide
      usage: methodology
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - vc-outreach-draft-queue
    - founder-outreach-and-intro-paths
    - citation-enforcement
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
    - vc_origination_pipeline
    supportedProjectScopes:
    - project_instance
    instructions:
      executionInstructions: 'Draft the first LinkedIn reachout for approved of-interest candidates or connected founders.
        Use concrete candidate evidence, founder context, and the approved thesis angle. Keep the message short, specific,
        and question-led. Do not mark the reachout as sent, update CRM stages, or contact the founder without explicit human
        approval. Use `definitionJson.documentRefs` as the durable document reference contract. Apply each reference by usage:
        `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist` must be
        completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance`
        or `policy` constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the
        referenced pack document and preserve the document ID alongside the output artifact.'
      missingInputPolicy: Ask for the approved candidate, founder LinkedIn URL, connection state, thesis angle, source evidence,
        and outreach tone policy before drafting.
      externalActionPolicy: Draft only. Sending LinkedIn messages, updating CRM stages, and changing outbound status require
        explicit human approval.
      completionCriteria:
      - Draft includes founder, company, profile URL, message text, evidence hook, owner, and skip reason where applicable.
      - Message is concise, specific, and anchored to cited candidate evidence.
      - Send and CRM mutation boundaries are explicit.
fields:
  input:
  - key: initial_reachout_scope
    name: Initial Reachout Scope
    fieldType: json
    required: true
    position: 0
    config: {}
  output:
  - key: initial_linkedin_reachout_artifact_id
    name: Initial LinkedIn Reachout Artifact
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.outreach_queue_template
  - key: initial_reachout_draft_count
    name: Initial Reachout Draft Count
    fieldType: number
    required: false
    position: 1
    config: {}
