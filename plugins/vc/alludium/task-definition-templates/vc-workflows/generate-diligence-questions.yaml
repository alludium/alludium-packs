kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.generate_diligence_questions
version: 1.0.23
title: Generate Diligence Questions
category: Venture Capital
visibility: workspace
tags:
  - vc
  - follow-up
  - questions
definition:
  name: Generate Diligence Questions
  slug: generate-diligence-questions
  description: Generate a structured investment diligence question bank for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: evaluation
    taskFamily: diligence
    documentRefs:
      - documentId: vc.document.investment_diligence_question_framework
        usage: methodology
        outputFieldKey: diligence_question_bank_artifact_id
      - documentId: vc.document.opportunity_evaluation_framework
        usage: methodology
      - documentId: vc.document.evaluation_workstream_guide
        usage: methodology
      - documentId: vc.document.commercial_evaluation_guide
        usage: methodology
      - documentId: vc.document.technical_evaluation_guide
        usage: methodology
      - documentId: vc.document.financial_evaluation_guide
        usage: methodology
      - documentId: vc.document.formal_diligence_workstream_guide
        usage: methodology
      - documentId: vc.document.formal_diligence_checklist
        usage: checklist
      - documentId: vc.document.legal_diligence_guide
        usage: methodology
      - documentId: vc.document.evidence_citation_style_guide
        usage: style_guide
      - documentId: vc.document.template_use_guidance
        usage: operating_guidance
    requiredSkills:
      - investment-diligence-question-framework
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_evaluation_analyst
    recommendedAgentTemplate: vc_evaluation_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-16
        note: Follow-up AI map
      - source: investment-management-process-slides
        anchor: slide-35
        note: Structured diligence question dimensions
    instructions:
      executionInstructions: >-
        Generate prioritized investment diligence questions with rationale, source gap, owner, and urgency. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named Structured Diligence Question Bank as a standalone safe static HTML artifact using the Artifact Create Text Artifact tool (`artifact.createTextArtifact`), a `.html` filename, and `mimeType: "text/html"`; do not use the Project Instantiate Template tool, `project.instantiateTemplate`, or `project_instantiateTemplate`, and do not create a `.md`/`text/markdown` artifact for this rendered output; then attach it to the required output field `diligence_question_bank_artifact_id`. Use `definitionJson.documentRefs` only as source guidance for rendered outputs. Read referenced templates, methodologies, checklists, style guides, operating guidance, and policies, but manually transform the relevant structure into the standalone HTML content passed to `artifact.createTextArtifact`. For refs with `outputFieldKey`, save the `artifact.createTextArtifact` result to that output field and preserve the document ID alongside the output artifact.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: investment-diligence-question-framework
        note: Use only when the workspace explicitly configures this diligence framework.
fields:
  input:
    - key: company_name
      name: Company Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: known_claims
      name: Known Claims
      fieldType: string
      required: true
      position: 1
      config: {}
    - key: existing_answers
      name: Existing Answers
      fieldType: string
      required: false
      position: 2
      config: {}
    - key: priority_workstreams
      name: Priority Workstreams
      fieldType: string
      required: false
      position: 3
      config: {}

  output:
    - key: diligence_question_bank_artifact_id
      name: Structured Diligence Question Bank
      fieldType: file
      required: true
      position: 0
      config:
        documentRefId: vc.document.investment_diligence_question_framework
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: generate_diligence_questions
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_evaluation_analyst
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
