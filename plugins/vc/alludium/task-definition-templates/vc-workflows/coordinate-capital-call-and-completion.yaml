definition:
  name: Coordinate Capital Call And Completion
  slug: coordinate-capital-call-and-completion
  description: Track final closing administration, capital call status, funds transfer readiness, share-certificate receipt,
    and portfolio handoff triggers without initiating banking or legal completion actions.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: closing
    taskFamily: closing
    documentRefs:
    - documentId: vc.document.completion_tracker_template
      usage: output_template
      outputFieldKey: completion_tracker_artifact_id
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - closing-coordination-and-cp-tracking
    - vc-task-and-next-step-generation
    - citation-enforcement
    plannedRecommendedAgentTemplate: vc_legal_compliance_desk
    recommendedAgentTemplate: vc_legal_compliance_desk
    supportedProjectTypes:
    - vc_investment_management
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-31
      note: Closing process
    - source: investment-management-process-slides
      anchor: slide-33
      note: Closing AI map
    - source: public-pattern-review
      anchor: deal-flow-stage-refactor-spec-public-pattern-review
      note: Closing coordination with strict external-action boundaries
    instructions:
      executionInstructions: 'Track the final administrative closing sequence from conditions precedent verification, closing
        checklist, transaction bible, administrator status, capital call status, funds transfer status, and share certificate
        status. Produce completion status, readiness notes, blockers, and portfolio handoff trigger recommendations. Cite
        material claims, separate assumptions from evidence, and do not initiate banking, administrator instructions, legal
        completion actions, external messages, CRM writes, folder/project creation, child task creation, or stage movement
        without explicit human approval. Create or update a durable project file artifact named Completion Tracker and attach
        it to the required output field `completion_tracker_artifact_id`. Use `definitionJson.documentRefs` as the durable
        document reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology`
        supplies scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide`
        governs citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries.
        For refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID
        alongside the output artifact.'
      missingInputPolicy: Ask for CP verification, closing checklist, and transaction bible before producing completion readiness.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation,
        child task creation, stage transition, administrator instruction, or banking action.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Completion tracker separates evidence-backed status from human/counsel/finance signoff.
      - Handoff trigger identifies owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve banking actions, administrator instructions, completion status, portfolio handoff, and stage movement.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
