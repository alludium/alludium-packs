kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.review_unicorn_signature
version: 0.1.0
title: Review Unicorn Signature
category: Venture Capital
visibility: workspace
tags:
- vc
- origination
- screening
- ic-summary
definition:
  name: Review Unicorn Signature
  slug: review-unicorn-signature
  description: Stress-test strong origination candidates for venture-scale shape before prospect-summary preparation.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: review
    taskFamily: origination_unicorn_signature
    documentRefs:
    - documentId: vc.document.sourcing_scoring_rubric
      usage: methodology
      outputFieldKey: unicorn_signature_artifact_id
    - documentId: vc.document.sourcing_ic_summary_template
      usage: operating_guidance
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - vc-sourcing-verdict-and-screening
    - origination-prospect-summary-preparation
    - citation-enforcement
    recommendedAgentTemplate: vc_sourcing_operator
    plannedRecommendedAgentTemplate: vc_sourcing_operator
    supportedProjectTypes:
    - vc_origination_pipeline
    supportedProjectScopes:
    - project_instance
    scheduleDefaults:
      enabledByDefault: false
      requiresHumanApprovalToEnable: true
      cadence: daily
      localTime: 08:50
      dryRunFirst: true
    scheduling:
      schedulable: true
      showInProjectSetup: true
      setupStep: schedules
      scheduleType: cron
      defaultScheduleRef: scheduleDefaults
      requiresHumanApprovalToEnable: true
      canCreateTestRun: true
      testRunCreatesVisibleTask: true
      dryRunFirst: true
      safety:
        externalWritesRequireApproval: true
    instructions:
      executionInstructions: 'Stress-test candidates that survived deal-fit and active screening for genuine venture-scale
        shape before creating a prospect summary. Classify the candidate as genuine, strong, on-pattern, or off-shape, and
        recommend whether to proceed to prospect summary, watchlist, or pass. Use market/category context only to support the
        classification; do not fabricate market size or traction. Use `definitionJson.documentRefs` as the durable document
        reference contract. Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies
        scoring or analysis logic, `checklist` must be completed with status, evidence, and owner, `style_guide` governs
        citations and claim language, and `operating_guidance` or `policy` constrains process and approval boundaries. For
        refs with `outputFieldKey`, produce that output from the referenced pack document and preserve the document ID alongside
        the output artifact.'
      missingInputPolicy: Ask for deal-fit and active-screen artifacts, category context, candidate evidence, and allowed
        next states before reviewing.
      externalActionPolicy: Review only. Do not demote protected manual decisions, write external systems, send outreach,
        or create Deal Pipeline projects without explicit approval.
      completionCriteria:
      - Classification is one of genuine, strong, on-pattern, or off-shape.
      - Recommendation states whether to proceed to prospect summary, watchlist, or pass.
      - Evidence gaps and validation questions are listed.
fields:
  input:
  - key: unicorn_signature_scope
    name: Unicorn Signature Scope
    fieldType: json
    required: true
    position: 0
    config: {}
  output:
  - key: unicorn_signature_artifact_id
    name: Unicorn Signature Artifact
    fieldType: file
    required: true
    position: 0
    config:
      documentRefId: vc.document.sourcing_scoring_rubric
  - key: unicorn_signature_recommendation
    name: Unicorn Signature Recommendation
    fieldType: string
    required: false
    position: 1
    config: {}
  - key: unicorn_signature_report
    name: Unicorn Signature Report
    fieldType: richtext
    required: false
    position: 2
    config:
      rows: 8
