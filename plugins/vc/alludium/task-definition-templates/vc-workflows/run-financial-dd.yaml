definition:
  name: Run Financial DD
  slug: run-financial-dd
  description: Run Financial DD for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: diligence
    taskFamily: diligence
    requiredSkills:
      - citation-enforcement
    plannedRequiredSkills:
      - financial-diligence-workstream
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-22
        note: DD workstreams
      - source: investment-management-process-slides
        anchor: slide-25
        note: Financial DD AI map
      - source: investment-management-process-slides
        anchor: slide-37
        note: Benchmarks
      - source: investment-management-process-slides
        anchor: slide-40
        note: DD timeline
      - source: atomic-agents
        anchor: worksheet-atomic-agents
        note: Spreadsheet row 25
    instructions:
      executionInstructions: Run financial diligence covering historicals, burn and runway, cap table, business-model economics, forecast stress test, use of funds, and financial risks from the supplied financial source artifact list. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update durable project file artifacts named Financial DD Report and Unit Economics Analysis, and attach them to the required output fields `financial_dd_artifact_id` and `unit_economics_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: traction-and-saas-unit-economics
        note: Use only for SaaS deals or workspaces that select this metric pack.
