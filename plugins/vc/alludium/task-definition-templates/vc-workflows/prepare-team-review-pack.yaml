category: Venture Capital
visibility: workspace
tags:
- vc
- team-review
- diligence
definition:
  name: Prepare Team Review Pack
  slug: prepare-team-review-pack
  description: Prepare Team Review Pack for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: decision_review
    taskFamily: diligence
    documentRefs:
    - documentId: vc.document.review_pack_checklist
      usage: output_template
      outputFieldKey: team_review_pack_artifact_id
    - documentId: vc.document.opportunity_evaluation_framework
      usage: methodology
    - documentId: vc.document.evaluation_workstream_guide
      usage: methodology
    - documentId: vc.document.formal_diligence_workstream_guide
      usage: methodology
    - documentId: vc.document.formal_diligence_checklist
      usage: checklist
    - documentId: vc.document.evidence_citation_style_guide
      usage: style_guide
    - documentId: vc.document.template_use_guidance
      usage: operating_guidance
    requiredSkills:
    - ic-memo-assembly
    - citation-enforcement
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
    - vc_deal_room
    sourceAnchors:
    - source: investment-management-process-slides
      anchor: slide-19
      note: Team/partner review stage
    - source: investment-management-process-slides
      anchor: slide-20
      note: Team/partner review AI map
    - source: investment-management-process-slides
      anchor: slide-35
      note: structured diligence dimensions
    - source: investment-management-process-slides
      anchor: slide-34
      note: Roles
    instructions:
      executionInstructions: 'Assemble the Team Review pack from evaluation-stage workstream outputs, the diligence question bank, available formal
        diligence outputs, evidence summary, founder risks, and stage-gate recommendation. Cite material claims, separate assumptions from evidence,
        and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval.
        Use required evaluation input file artifacts `commercial_evaluation_artifact_id`, `technical_evaluation_artifact_id`, `financial_evaluation_artifact_id`,
        `team_evaluation_artifact_id`, and `diligence_question_bank_artifact_id` as the decision-review source set. Use formal diligence artifacts
        `commercial_dd_artifact_id`, `financial_dd_artifact_id`, `founder_evaluation_artifact_id`, and `technical_dd_artifact_id` when present,
        but do not block evaluation-stage review on them. Create or update a durable project file artifact named Team Review Pack and attach it
        to the required output field `team_review_pack_artifact_id`. Use `definitionJson.documentRefs` as the durable document reference contract.
        Apply each reference by usage: `output_template` sets the output skeleton, `methodology` supplies scoring or analysis logic, `checklist`
        must be completed with status, evidence, and owner, `style_guide` governs citations and claim language, and `operating_guidance` or `policy`
        constrains process and approval boundaries. For refs with `outputFieldKey`, produce that output from the referenced pack document and
        preserve the document ID alongside the output artifact.'
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation,
        or stage transition.
      completionCriteria:
      - Required input gaps are resolved or listed as assumptions/open questions.
      - Material conclusions include source links or are labeled as human judgment calls.
      - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
    - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
    - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
    - skill: investment-diligence-question-framework
      note: Use only when the workspace explicitly configures this diligence framework.
