  - vc
  - team-review
  - diligence
definition:
  name: Prepare Team Review Pack
  slug: prepare-team-review-pack
  description: Prepare Team Review Pack for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: review
    taskFamily: diligence
    requiredSkills:
      - ic-memo-assembly
      - citation-enforcement
    plannedRequiredSkills:
      - ic-memo-assembly
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_diligence_analyst
    recommendedAgentTemplate: vc_diligence_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-19
        note: Team/partner review stage
      - source: investment-management-process-slides
        anchor: slide-20
        note: Team/partner review AI map
      - source: investment-management-process-slides
        anchor: slide-35
        note: 82-Factor dimensions
      - source: investment-management-process-slides
        anchor: slide-34
        note: Roles
    instructions:
      executionInstructions: Assemble the Team Review pack from prior stage outputs, evidence summary, 10-Factor and 82-Factor summaries, founder risks, and stage-gate recommendation. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Use the required input file artifacts `commercial_dd_artifact_id`, `financial_dd_artifact_id`, `founder_evaluation_artifact_id`, `technical_dd_artifact_id`, and `eighty_two_factor_questions_artifact_id` as the review subjects for the team review pack. Create or update a durable project file artifact named Team Review Pack and attach it to the required output field `team_review_pack_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: 82-factor-diligence-question-generation
        note: Use only when the workspace explicitly configures this diligence framework.
