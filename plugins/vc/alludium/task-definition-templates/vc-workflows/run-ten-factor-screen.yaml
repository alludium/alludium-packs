id: vc.run_ten_factor_screen
version: 1.0.2
title: Run 10-Factor Screen
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - screening
  - ten-factor
definition:
  name: Run 10-Factor Screen
  slug: run-ten-factor-screen
  description: Run 10-Factor Screen for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: initial_call
    taskFamily: screening
    requiredSkills:
      - red-flags-scanner
      - citation-enforcement
    plannedRequiredSkills:
      - red-flags-scanner
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_first_look_analyst
    recommendedAgentTemplate: vc_first_look_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-9
        note: 10-Factor model
      - source: investment-management-process-slides
        anchor: slide-13
        note: Initial call stage
      - source: investment-management-process-slides
        anchor: slide-14
        note: Initial call AI map
    instructions:
      executionInstructions: Score each 10-Factor criterion with rationale, source links, unknowns, and human-review prompts before recommending continue or pass. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: ten-factor-evaluation
        note: Use only when the workspace explicitly configures this screening framework.
