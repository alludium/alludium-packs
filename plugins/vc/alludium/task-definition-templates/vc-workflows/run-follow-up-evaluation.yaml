kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.run_follow_up_evaluation
version: 1.0.2
title: Run Follow-Up Evaluation
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - follow-up
  - diligence
definition:
  name: Run Follow-Up Evaluation
  slug: run-follow-up-evaluation
  description: Run Follow-Up Evaluation for one venture-capital opportunity with evidence capture, human review gates, and next-action recommendations.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    stage: assessment
    taskFamily: diligence
    requiredSkills:
      - red-flags-scanner
      - citation-enforcement
    plannedRequiredSkills:
      - red-flags-scanner
      - citation-enforcement
    plannedRecommendedAgentTemplate: vc_first_look_analyst
    recommendedAgentTemplate: vc_first_look_analyst
    supportedProjectTypes:
      - vc_deal_room
    sourceAnchors:
      - source: investment-management-process-slides
        anchor: slide-15
        note: Follow-up stage
      - source: investment-management-process-slides
        anchor: slide-16
        note: Follow-up AI map
      - source: investment-management-process-slides
        anchor: slide-35
        note: 82-Factor dimensions
    instructions:
      executionInstructions: Build the follow-up evaluation workspace with document requests, competitive landscape, early risks, and readiness recommendation. Cite material claims, separate assumptions from evidence, and do not send messages, mutate CRM records, create folders/projects, create child tasks, or move stages without explicit human approval. Use workspace-configured scoring frameworks, CRM providers, stage names, and deal-type metric packs; do not assume a specific fund, CRM, or SaaS default unless the workspace configuration explicitly selects it. Create or update a durable project file artifact named Follow-Up Evaluation and attach it to the required output field `follow_up_evaluation_artifact_id`.
      missingInputPolicy: Ask for missing required inputs before producing investment-stage recommendations.
      externalActionPolicy: Draft only unless a human explicitly approves the send, CRM write, Drive change, project creation, child task creation, or stage transition.
      completionCriteria:
        - Required input gaps are resolved or listed as assumptions/open questions.
        - Material conclusions include source links or are labeled as human judgment calls.
        - Next actions identify owner, dependency, and required human approval point.
    humanDecisionPoints:
      - Approve investment-stage movement, pass/follow-up recommendations, and final task completion.
      - Approve external communications, CRM writes, Drive/project creation, legal/counsel actions, and founder-facing requests.
    orchestration:
      parentTaskPolicy: none
      suggestedChildTasks: []
    workspaceConfiguredMethodologySkills:
      - skill: 82-factor-diligence-question-generation
        note: Use only when the workspace explicitly configures this diligence framework.
      - skill: market-map-building
        note: Use only when the workspace explicitly configures this market mapping method.
fields:
  input:
    - key: company_name
      name: Company Name
      fieldType: string
      required: true
      position: 0
      config: {}
    - key: first_look_scorecard_artifact_id
      name: First-Look Scorecard
      fieldType: file
      required: true
      position: 1
      config: {}
    - key: customer_insights_artifact_id
      name: Customer Insights Summary
      fieldType: file
      required: true
      position: 2
      config: {}

  output:
    - key: follow_up_evaluation_artifact_id
      name: Follow-Up Evaluation
      fieldType: file
      required: true
      position: 0
      config: {}
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc-workflows
      taskKind: run_follow_up_evaluation
  requiredResources:
    requiresTaskChat: true
  executionProfile:
    agentStartsImmediately: true
    maxAgentTurnsPerPass: 6
    requiresHumanConfirmationToComplete: true
    preferredMode: guided_execution
    preferredAgentType: vc_first_look_analyst
ui:
  renderer: generic
  surfaceKey: null
  frameRef: null
