kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.affinity_setup
version: 0.1.3
title: Set Up Affinity for VC Deal Rooms
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - affinity
  - setup
definition:
  name: Set Up Affinity for VC Deal Rooms
  slug: affinity-setup
  description: Coordinate Affinity connection readiness, list discovery, read-preview policy, and optional write-back proposal scope for VC Deal Room setup.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    taskFamily: integration_setup
    requiredSkills:
      - vc-affinity-discovery
      - vc-affinity-sync-read
      - vc-affinity-sync-write
      - citation-enforcement
    plannedRequiredSkills:
      - vc-affinity-discovery
      - vc-affinity-sync-read
      - vc-affinity-sync-write
      - citation-enforcement
    recommendedAgentTemplate: vc_deal_room_setup_guide
    plannedRecommendedAgentTemplate: vc_deal_room_setup_guide
    supportedProjectTypes:
      - vc_deal_room
    supportedProjectScopes:
      - project_management
    integrationSetup:
      applicationExternalId: affinity-mcp-server
      childTaskDefinitionTemplateIds:
        discovery: vc.affinity_discovery
        syncRead: vc.affinity_sync_read
        syncWrite: vc.affinity_sync_write
      defaultFlow:
        - kind: discovery
          taskDefinitionTemplateId: vc.affinity_discovery
          label: Explore Affinity lists and stages
        - kind: sync_read
          taskDefinitionTemplateId: vc.affinity_sync_read
          label: Preview selected pipeline data
        - kind: sync_write
          taskDefinitionTemplateId: vc.affinity_sync_write
          label: Draft write-back proposals
    instructions:
      executionInstructions: Confirm that Affinity is the selected CRM path from the task integration setup context, then lead the setup through read-only discovery. On startup, use the relevant Affinity discovery tools to find available lists/pipelines and ask one required card-style task question for the user to choose the source scope. After the answer, inspect only that selected scope, propose a stage mapping with an inputType=mapping task question, then fetch a bounded visible set of recent deals and ask one required multiselect card question with select-all enabled. The seed question must show the visible deals and allow the user to select individual visible deals, select all visible deals, or explicitly defer seed selection. Summarize the selected source, accepted mapping, selected seed deals or defer decision, and sync-readiness notes before asking the user to use Complete step. Do not call task-management.completeTask, task-management.completeHumanTask, or any completion tool yourself. Do not call user-agent-deployment.getAgentSetupStatus for this task; that reports the assigned agent deployment, not the pack integration requirement. Create child tasks from the declared integrationSetup flow only when the user chooses that step. Keep all import, recurring sync, CRM writes, note creation, and stage movement disabled unless a later human approval explicitly creates that task.
      missingInputPolicy: If Affinity is not authorized or no source scope is selected, keep setup incomplete, ask the user to authorize Affinity or provide an exported list/stage snapshot, and stop. Do not complete this task while connection evidence or required task questions are unresolved.
      externalActionPolicy: Setup orchestration only. Do not import records, enable recurring sync, update CRM fields, write notes, move stages, or create Deal Room projects from this setup task.
      humanConfirmationPolicy: when_external_setup_incomplete
      completionCriteria:
        - Affinity connection evidence is connected, or a user-approved exported snapshot fallback is recorded in task context.
        - Required task questions for connection sharing scope and discovery scope are answered.
        - The selected Affinity list or pipeline has been inspected in read-only mode.
        - Source stages or swimlanes have been mapped to VC Deal Room stages, or the user explicitly chose to defer mapping.
        - A bounded visible deal set has been presented and the user selected visible seed deals, selected all visible deals, or explicitly chose to defer seed selection.
        - Read-preview and optional write-proposal policies are recorded without enabling external writes.
        - The accepted connection scope states whether access is personal, project-shared, or workspace-shared.
        - The agent has summarized the reviewed evidence and asked the user to complete the task; the agent has not completed it.
    humanDecisionPoints:
      - Choose whether the Affinity connection is personal, project-shared, or workspace-shared.
      - Choose the Affinity list/source and active stage scope.
      - Approve any read-preview, import, recurring sync, or write-back task separately.
fields:
  input:
    - key: setup_goal
      name: Setup Goal
      fieldType: string
      required: true
      position: 0
      config: {}
  output:
    - key: setup_summary
      name: Setup Summary
      fieldType: richtext
      required: false
      position: 0
      config:
        rows: 8
    - key: accepted_connection_scope
      name: Accepted Connection Scope
      fieldType: string
      required: false
      position: 1
      config: {}
    - key: child_task_plan
      name: Child Task Plan
      fieldType: json
      required: false
      position: 2
      config: {}
    - key: selected_source_scope
      name: Selected Source Scope
      fieldType: json
      required: false
      position: 3
      config: {}
    - key: accepted_stage_mapping
      name: Accepted Stage Mapping
      fieldType: json
      required: false
      position: 4
      config: {}
    - key: seed_selection
      name: Seed Selection
      fieldType: json
      required: false
      position: 5
      config: {}
    - key: sync_policy
      name: Sync Policy
      fieldType: json
      required: false
      position: 6
      config: {}
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc
      taskKind: affinity_setup
      integrationKey: affinity-mcp-server
  requiredResources:
    requiresTaskChat: true
    requiredApplications:
      - applicationExternalId: affinity-mcp-server
        applicationName: Affinity CRM
        connectionScope: USER_CONFIGURED
  executionProfile:
    agentStartsImmediately: true
    maxAgentTurnsPerPass: 4
    preferredAgentType: vc_deal_room_setup_guide
    preferredMode: guided_integration_setup
    requiresHumanConfirmationToComplete: true
