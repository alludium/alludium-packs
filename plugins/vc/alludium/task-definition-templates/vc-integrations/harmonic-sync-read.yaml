kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.harmonic_sync_read
version: 0.1.4
title: Preview Harmonic Search Results
category: Venture Capital
visibility: workspace
tags:
- vc
- harmonic
- sync-read
definition:
  name: Preview Harmonic Search Results
  slug: harmonic-sync-read
  description: Preview selected Harmonic company or saved-search results before using them as VC sourcing or screening context.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    taskFamily: integration_sync_read
    requiredSkills:
    - vc-harmonic-sync-read
    - citation-enforcement
    recommendedAgentTemplate: vc_integration_operator
    plannedRecommendedAgentTemplate: vc_integration_operator
    supportedProjectTypes:
    - vc_deal_room
    supportedProjectScopes:
    - project_management
    instructions:
      executionInstructions: Build a Harmonic read preview only after discovery has selected a saved search, daily search,
        company, or result scope and live tool IDs are known. The current local platform catalog has no trusted Harmonic tool
        rows, so treat live reads as blocked until tool discovery after authorization succeeds. When tools exist, process
        only selected company/search results and propose target mapping as sourcing context, task context, watchlist candidates,
        or Deal Pipeline setup context.
      missingInputPolicy: Ask for selected Harmonic source scope and discovered tool IDs before processing search results.
      externalActionPolicy: Read preview only. Do not create Deal Pipelines, import companies, mark net-new results as seen,
        update saved searches, export contacts, or write back to Harmonic.
      completionCriteria:
      - Preview rows include Harmonic source IDs, company/person identity signals, relevance notes, and rejection reasons
        when available.
      - Tool IDs used or missing are named.
      - Import, watchlist creation, or recurring monitoring approval remains separate from the preview.
    humanDecisionPoints:
    - Approve result rows before importing or attaching context.
    - Approve dedupe decisions and target mappings.
fields:
  input:
  - key: selected_harmonic_scope
    name: Selected Harmonic Scope
    fieldType: json
    required: true
    position: 0
    config: {}
  output:
  - key: harmonic_results_preview
    name: Harmonic Results Preview
    fieldType: richtext
    required: false
    position: 0
    config:
      rows: 8
  - key: target_context_mapping
    name: Target Context Mapping
    fieldType: json
    required: false
    position: 1
    config: {}
