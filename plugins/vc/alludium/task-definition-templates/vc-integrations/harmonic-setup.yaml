kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.harmonic_setup
version: 0.1.0
title: Set Up Harmonic for VC Deal Rooms
category: Venture Capital
visibility: workspace
systemUseOnly: false
tags:
  - vc
  - harmonic
  - setup
definition:
  name: Set Up Harmonic for VC Deal Rooms
  slug: harmonic-setup
  description: Coordinate Harmonic connection readiness, saved-search discovery, and read-preview policy for VC Deal Room setup.
  allowSubtasks: true
  definitionJson:
    vertical: vc
    taskFamily: integration_setup
    requiredSkills:
      - vc-harmonic-discovery
      - vc-harmonic-sync-read
      - citation-enforcement
    plannedRequiredSkills:
      - vc-harmonic-discovery
      - vc-harmonic-sync-read
      - citation-enforcement
    recommendedAgentTemplate: vc_pipeline_autopilot
    plannedRecommendedAgentTemplate: vc_pipeline_autopilot
    supportedProjectTypes:
      - vc_deal_room
    supportedProjectScopes:
      - project_management
    integrationSetup:
      applicationExternalId: harmonic-mcp-oauth
      childTaskDefinitionTemplateIds:
        discovery: vc.harmonic_discovery
        syncRead: vc.harmonic_sync_read
      defaultFlow:
        - kind: discovery
          taskDefinitionTemplateId: vc.harmonic_discovery
          label: Explore Harmonic saved searches
        - kind: sync_read
          taskDefinitionTemplateId: vc.harmonic_sync_read
          label: Preview selected search results
    instructions:
      executionInstructions: Confirm that Harmonic is a selected company-intelligence source, check connection readiness, then coordinate saved-search/source discovery and reviewed read-preview setup. Create child tasks from the declared integrationSetup flow only when the user chooses that step. Keep imports, watchlist creation, recurring sync, and external writes disabled unless a later human approval explicitly creates that task.
      missingInputPolicy: If Harmonic is not authorized, has no discovered tools, or no saved-search/source scope is selected, keep setup incomplete and ask for authorization, tool discovery, a supplied inventory, or the source-scope decision needed for discovery.
      externalActionPolicy: Setup orchestration only. Do not import companies or people, create watchlists, enable recurring sync, write to Harmonic, or create Deal Room projects from this setup task.
      completionCriteria:
        - Connection readiness or missing-authorization/tool-discovery evidence is recorded.
        - Candidate saved-search/source scope is complete or the unanswered scope questions are explicit.
        - Read-preview policy is recorded without enabling import, recurring sync, or writes.
        - The accepted connection scope states whether access is personal, project-shared, or workspace-shared.
    humanDecisionPoints:
      - Choose whether the Harmonic connection is personal, project-shared, or workspace-shared.
      - Choose the saved search, daily search, company, or source scope.
      - Approve any read-preview, import, watchlist, or recurring sync task separately.
fields:
  input:
    - key: setup_goal
      name: Setup Goal
      fieldType: string
      required: true
      position: 0
      config: {}
  output:
    - key: setup_summary
      name: Setup Summary
      fieldType: richtext
      required: false
      position: 0
      config:
        rows: 8
    - key: accepted_connection_scope
      name: Accepted Connection Scope
      fieldType: string
      required: false
      position: 1
      config: {}
    - key: child_task_plan
      name: Child Task Plan
      fieldType: json
      required: false
      position: 2
      config: {}
    - key: sync_policy
      name: Sync Policy
      fieldType: json
      required: false
      position: 3
      config: {}
