kind: task-definition-template
apiVersion: alludium/v1alpha1
id: vc.affinity_deal_room_import
version: 0.1.4
title: Import Affinity Deal Pipeline Seed
category: Venture Capital
visibility: workspace
tags:
- vc
- affinity
- import
- deal-room
definition:
  name: Import Affinity Deal Pipeline Seed
  slug: affinity-deal-room-import
  description: Import one approved Affinity seed deal into an already-created Deal Pipeline project with source provenance
    and approval evidence.
  allowSubtasks: false
  definitionJson:
    vertical: vc
    stage: intake
    taskFamily: integration_project_import
    requiredSkills:
    - vc-affinity-deal-pipeline-import
    - vc-affinity-sync-read
    - deal-pipeline-setup-and-source-ingestion
    - citation-enforcement
    recommendedAgentTemplate: vc_deal_room_setup_guide
    plannedRecommendedAgentTemplate: vc_deal_room_setup_guide
    supportedProjectTypes:
    - vc_deal_room
    supportedProjectScopes:
    - project_instance
    instructions:
      executionInstructions: Import only the approved Affinity seed deal represented by the `import_payload` into the current
        Deal Pipeline project. Confirm the platform has already created the target project, verify the payload contains reviewed
        source scope, accepted stage mapping, selected seed deal, and approval metadata, then perform the smallest approved
        Affinity reads needed to populate source provenance and field mapping. Map company identity into company_name, company_domain,
        optional company_logo_url when an approved Affinity/enrichment field provides a usable image URL, source reference
        fields, owner/source fields, and initial investment stage. When approved associated person IDs are available on the
        Affinity organization or opportunity, read only those person records needed to identify founders or founder contacts,
        then populate founder_names and founder_profiles. Prefer founder_profiles as a JSON array of objects with name, email,
        linkedinUrl, sourcePersonId, title, and sourceUrl keys, omitting unknown keys. sourcePersonId is the external person
        record ID from the source CRM; sourceUrl is the external person/profile URL when available. Produce a durable import
        receipt artifact and compact summaries of imported fields, source records read, duplicate handling, unresolved gaps,
        and recommended next Deal Pipeline tasks. Do not create projects, import unapproved records, enable recurring sync,
        write to Affinity, move stages, create notes, update external records, send notifications, or create follow-up tasks.
      missingInputPolicy: If the target project, approved seed deal, reviewed source scope, accepted stage mapping, or approval
        metadata is missing, mark the import blocked, name the missing evidence, and produce an import receipt. Do not invent
        source IDs or broaden scope.
      externalActionPolicy: Project-scoped import only. Reads are limited to approved Affinity records. External writes, recurring
        sync, CRM mutation, stage movement, note creation, notifications, and project creation are forbidden.
      humanConfirmationPolicy: always_before_external_write_or_schedule_enablement
      completionCriteria:
      - The target Deal Pipeline project already exists and is named in the receipt.
      - The approved Affinity seed deal, source scope, stage mapping, and approval metadata are recorded.
      - Imported project-field values list source IDs, source URLs, confidence, and gaps.
      - Founder identity output uses founder_names plus structured founder_profiles when associated Affinity person records
        or approved seed fields provide enough evidence.
      - Duplicate handling states that the platform-created project is the canonical target for this seed deal.
      - No external writes, recurring schedules, or additional project creations were performed.
    humanDecisionPoints:
    - Approve retrying a blocked import with corrected setup evidence.
    - Approve any later Affinity write-back, recurring sync, notification, or follow-up task creation separately.
fields:
  input:
  - key: import_payload
    name: Import Payload
    fieldType: json
    required: true
    position: 0
    config:
      contractRef: vc.affinity_deal_room_import.import_payload.v1
      requiredTopLevelKeys:
      - setupTaskId
      - approval
      - source
      - seed
      - targetProject
      requiredApprovalKeys:
      - approvedByUserId
      - approvedAt
      - reviewedEvidenceArtifactIds
      requiredSourceKeys:
      - provider
      - selectedSourceScope
      - acceptedStageMapping
      requiredSeedKeys:
      - affinityOrganizationId
      - companyName
      requiredTargetProjectKeys:
      - projectId
      - projectTypeKey
      - workspaceId
  output:
  - key: affinity_import_receipt_artifact_id
    name: Affinity Import Receipt
    fieldType: file
    required: true
    position: 0
    config: {}
  - key: import_status
    name: Import Status
    fieldType: select
    required: false
    position: 1
    config:
      options:
      - completed
      - partial
      - blocked
      - failed
  - key: import_summary
    name: Import Summary
    fieldType: richtext
    required: false
    position: 2
    config:
      rows: 8
  - key: imported_field_map
    name: Imported Field Map
    fieldType: richtext
    required: false
    position: 3
    config:
      rows: 8
  - key: source_index
    name: Source Index
    fieldType: richtext
    required: false
    position: 4
    config:
      rows: 6
  - key: next_task_recommendations
    name: Next Task Recommendations
    fieldType: richtext
    required: false
    position: 5
    config:
      rows: 6
runtime:
  defaultExecutionContext:
    sourceMetadata:
      templateFamily: vc
      taskKind: affinity_deal_room_import
      integrationKey: affinity-mcp-server
      projectType: vc_deal_room
  requiredResources:
    requiresTaskChat: true
    requiredApplications:
    - applicationExternalId: affinity-mcp-server
      applicationName: Affinity CRM
      connectionScope: USER_CONFIGURED
  executionProfile:
    agentStartsImmediately: true
    preferredAgentType: vc_deal_room_setup_guide
    preferredMode: guarded_project_import
    requiresHumanConfirmationToComplete: true
