schemaVersion: "0.1"
pack:
  id: vc
  name: Alludium VC
  version: "0.4.2"
  description: >
    Public VC workflow plugin and pack seed for Alludium, published as the
    first bundle in the broader Alludium packs catalog. This release contains
    VC skills, Alludium runtime agent templates, VC task-definition templates,
    VC Deal Room and VC Origination Pipeline project type definitions,
    workspace variable declarations, application recommendation metadata, and
    single-entry integration setup task recommendations.
  publisher: Alludium
  license: Apache-2.0
  repository: https://github.com/alludium/alludium-packs
compatibility:
  minPlatformVersion: "0.2.1"
  pluginFormats:
    - claude-plugin
    - codex-plugin
surfaces:
  skills:
    path: skills
    ids:
      - 82-factor-diligence-question-generation
      - citation-enforcement
      - closing-coordination-and-cp-tracking
      - commercial-diligence-workstream
      - company-research-and-enrichment
      - deal-room-setup-and-source-ingestion
      - financial-diligence-workstream
      - founder-evaluation-and-reference-checking
      - founder-materials-request
      - founder-outreach-and-intro-paths
      - ic-memo-assembly
      - ic-risk-checklist-and-decision-log
      - market-map-building
      - meeting-prep-and-summary
      - pipeline-health-and-crm-hygiene
      - pitch-deck-explainer
      - portfolio-onboarding-and-100-day-plan
      - red-flags-scanner
      - team-and-hiring-assessment
      - technical-diligence-workstream
      - ten-factor-evaluation
      - traction-and-saas-unit-economics
      - vc-task-and-next-step-generation
      - vc-affinity-discovery
      - vc-affinity-sync-read
      - vc-affinity-sync-write
      - vc-slack-discovery
      - vc-slack-sync-read
      - vc-slack-sync-write
      - vc-google-drive-discovery
      - vc-google-drive-sync-read
      - vc-google-drive-sync-write
      - vc-notion-discovery
      - vc-notion-sync-read
      - vc-notion-sync-write
      - vc-harmonic-discovery
      - vc-harmonic-sync-read
      - vc-origination-pipeline-orchestration
      - vc-source-registry-and-state-management
      - vc-apify-discovery
      - vc-apify-sync-read
      - vc-apify-linkedin-founder-discovery
