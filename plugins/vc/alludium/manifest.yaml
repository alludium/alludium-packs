      - vc-linkedin-query-spend-audit
      - vc-source-error-and-spend-audit
      - vc-origination-ic-summary-preparation
  alludiumAgentTemplates:
    path: alludium/agent-templates
    ids:
      - vc_dealflow_concierge
      - vc_diligence_analyst
      - vc_first_look_analyst
      - vc_ic_prep_producer
      - vc_legal_compliance_desk
      - vc_meeting_operator
      - vc_origination_scout
      - vc_pipeline_autopilot
  mcpServers:
    path: .mcp.json
    status: installable-plugin-definitions
  alludiumMcpRecommendations:
    path: alludium/mcp-recommendations.yaml
    status: platform-mapping
  alludiumApplicationRecommendations:
    path: alludium/mcp-recommendations.yaml
    status: platform-application-recommendations
  workspaceVariables:
    path: alludium/workspace-variables.yaml
    status: platform-workspace-variable-declarations
  taskDefinitionTemplates:
    path: alludium/task-definition-templates
    platformIngest:
      status: requires-platform-support
      requiresCapability: external-task-definition-template-ingest
      minimumPlatformVersion: "0.2.1"
      note: >
        Platform versions that only support external pack skills and Alludium
        agent templates will ignore this surface. Use this surface only with a
        platform release that declares external task-definition-template ingest
        support.
