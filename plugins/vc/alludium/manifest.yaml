    path: alludium/project-types
    platformIngest:
      status: requires-platform-support
      requiresCapability: external-project-type-ingest
      minimumPlatformVersion: "0.3.0"
      note: >
        Platform versions without external project-type ingest support should
        ignore this surface and continue using platform-local project types.
        Use this surface only with a platform release that declares external
        project-type ingest support.
    ids:
      - vc_deal_room
      - vc_origination_pipeline
boundaries:
  publicSafe: true
  secretsAllowed: false
  internalOnlySkillsAllowed: false
  activationModel: available-not-automatically-installed
