schemaVersion: '0.1'
pack:
  id: vc
  name: Alludium VC
  version: 0.5.18
  description: 'Public VC workflow plugin and pack seed for Alludium, published as the first bundle in the broader Alludium packs catalog. This
    release contains VC skills, Alludium runtime agent templates, VC task-definition templates, VC Deal Room and VC Origination Pipeline project
    type definitions, workspace variable declarations, application recommendation metadata, single-entry integration setup task recommendations,
    pack-native project methodology documents, and per-project creation metadata for VC project instances.

    '
  publisher: Alludium
  license: Apache-2.0
  repository: https://github.com/alludium/alludium-packs
compatibility:
  minPlatformVersion: 0.2.1
  pluginFormats:
  - claude-plugin
  - codex-plugin
