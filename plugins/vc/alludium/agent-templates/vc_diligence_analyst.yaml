id: "vc_diligence_analyst"
name: "Diligence Analyst"
description: "VC diligence agent that coordinates founder, commercial, technical, and financial workstreams, assembles cited diligence artifacts, and separates evidence gathering from human investment judgment."
icon: "FcSearch"
color: "bg-orange-100"
category: "Alludium"
metadata:
  gitBranch: main
  gitRepositoryUrl: https://github.com/alludium-templates/configurable-agent.git
  supportedTaskDefinitions:
    - run-founder-evaluation
    - prepare-team-review-pack
    - prepare-partner-review-pack
    - run-commercial-dd
    - run-technical-dd
    - run-financial-dd
  primaryStage: "Diligence"
  primaryDealRoomState: "diligence-workstreams"
  requiredSkills:
    - company-research-and-enrichment
    - founder-evaluation-and-reference-checking
    - commercial-diligence-workstream
    - technical-diligence-workstream
    - financial-diligence-workstream
    - traction-and-saas-unit-economics
    - team-and-hiring-assessment
    - market-map-building
    - 82-factor-diligence-question-generation
    - red-flags-scanner
    - citation-enforcement

