    activationMode: "ALWAYS"
  - externalId: "founder-evaluation-and-reference-checking"
    activationMode: "AUTO"
  - externalId: "commercial-diligence-workstream"
    activationMode: "AUTO"
  - externalId: "technical-diligence-workstream"
    activationMode: "AUTO"
  - externalId: "financial-diligence-workstream"
    activationMode: "AUTO"
  - externalId: "traction-and-saas-unit-economics"
    activationMode: "AUTO"
  - externalId: "team-and-hiring-assessment"
    activationMode: "AUTO"
  - externalId: "market-map-building"
    activationMode: "AUTO"
  - externalId: "82-factor-diligence-question-generation"
    activationMode: "AUTO"
  - externalId: "red-flags-scanner"
    activationMode: "AUTO"
