    - name: artifact.attachToChat
    - name: artifact.detachFromChat
    - name: artifact.getArtifactsLinkedToChat
  harmonic-mcp-oauth:
    tools:
    - name: get_companies
    - name: typeahead_search
    - name: search_companies_natural_language
    - name: get_people
  affinity-mcp-server:
