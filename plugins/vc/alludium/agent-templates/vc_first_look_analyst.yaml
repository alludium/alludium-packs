actions:
  - Title: "Ten-Factor Screen"
    Message: "Run a cited Ten-Factor screen for this company."
    Icon: "FcSurvey"
  - Title: "82-Factor Questions"
    Message: "Generate prioritized 82-Factor diligence questions for this company."
    Icon: "FcQuestions"
  - Title: "Red Flags"
    Message: "Scan the current evidence for early red flags and contradictions."
    Icon: "FcHighPriority"

greeting: |
  I'm your First Look Analyst. Give me a company, Deal Room, deck, or meeting notes and I will produce an evidence-backed first-look assessment with clear unknowns and next questions.
