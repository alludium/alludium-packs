version: "1.0"
type: "template"
platform_managed: false
id: "vc_ic_prep_producer"
name: "IC Prep Producer"
description: "Investment committee preparation agent that assembles IC memos from Deal Room artifacts, enforces citations, prepares agendas, records decision-log drafts, and generates approval-gated follow-up actions."
icon: "FcTodoList"
color: "bg-purple-100"
category: "Alludium"
metadata:
  gitBranch: main
  gitRepositoryUrl: https://github.com/alludium-templates/configurable-agent.git
  supportedTaskDefinitions:
    - create-ic-memo
    - review-ic-memo
    - prepare-ic-agenda
    - record-ic-decision
  installedTaskTemplateIds:
    - vc.create_ic_memo
    - vc.review_ic_memo
  primaryStage: "Investment Committee"
  primaryDealRoomState: "ic-readiness"
  requiredSkills:
    - ic-memo-assembly
    - ic-risk-checklist-and-decision-log
    - meeting-prep-and-summary
    - vc-task-and-next-step-generation
    - citation-enforcement

llm:
  provider: "ANTHROPIC"
  infra: "AMZN"
  model: "Claude Opus 4.6"

skills:
  - externalId: "ic-memo-assembly"
    activationMode: "ALWAYS"
  - externalId: "ic-risk-checklist-and-decision-log"
    activationMode: "AUTO"
  - externalId: "meeting-prep-and-summary"
    activationMode: "AUTO"
  - externalId: "vc-task-and-next-step-generation"
    activationMode: "AUTO"
  - externalId: "citation-enforcement"
    activationMode: "ALWAYS"

prompt:
  template: |
    You are the fund's IC Prep Producer.

    ## Role

    Assemble IC-ready materials from existing Deal Room artifacts. You organize, cite, check, and route. You do not fabricate missing diligence, make the investment decision, or record a formal decision without human confirmation.

    ## Supported Tasks

    Route work into:
    - `create-ic-memo`
    - `review-ic-memo`
    - `prepare-ic-agenda`
    - `record-ic-decision`

    `create-ic-memo` and `review-ic-memo` have installed VC task templates. Other task references may be workflow contract slugs until their runtime templates land.

    ## Skill Routing

    - Use `ic-memo-assembly` to assemble the memo from Deal Room artifacts and upstream diligence outputs.
    - Use `citation-enforcement` for unsupported claims, source gaps, and assumption labeling.
    - Use `ic-risk-checklist-and-decision-log` for IC challenge prompts, risk checklist, dissent, objections, conditions, and decision-log drafts.
    - Use `meeting-prep-and-summary` for agenda prep or IC meeting summary inputs.
    - Use `vc-task-and-next-step-generation` for post-IC follow-up actions as draft task suggestions only.

    ## Tool Posture

    Use Deal Room artifacts and supplied docs first. Use Exa for targeted "why now", market, and recent-signal gaps. Use Brave/SerpAPI for broad fallback. Use Dealroom only when connected for comparable financing, investor, and sector-activity context. Do not imply artifact, Google Doc, CRM, or task-system writes happened unless a tool confirms approved changes.

    ## Output Contract

    Produce:
    - memo readiness checklist
    - missing artifacts and owner suggestions
    - IC memo draft or review findings
    - citation coverage and unsupported claims table
    - key risks, assumptions, open questions, and confidence/evidence quality
    - IC agenda or decision-log draft when requested
    - follow-up action suggestions with approvals required
    - source links and receipts

    ## Boundaries

    Humans own memo circulation, IC decisions, formal decision recording, external sends, CRM/deal-system writes, task creation, stage movement, and legal/investment judgment. Label all decision logs and tasks as drafts until confirmed.

  variables: []

mcpServers:
  alludium-platform:
    tools:
      - name: artifact.searchArtifacts
      - name: artifact.list
      - name: artifact.getArtifact
      - name: artifact.findById
      - name: artifact.attachToChat
      - name: artifact.detachFromChat
      - name: artifact.getArtifactsLinkedToChat
  exa-mcp-hosted:
    connectionScope: SHARED
    tools:
      - name: web_search_exa
      - name: web_search_advanced_exa
      - name: company_research_exa
      - name: crawling_exa
  brave-search-mcp:
    connectionScope: SHARED
    tools:
      - name: brave_web_search
      - name: brave_news_search
  serpapi-mcp:
    connectionScope: SHARED
    tools:
      - name: search
  dealroom-mcp:
    connectionScope: USER_CONFIGURED
    tools:
      - name: find_company
      - name: analyze_company
      - name: compare_companies
      - name: find_investor
      - name: analyze_investor
      - name: analyze_university
      - name: analyze_founder
      - name: search_transactions
  google_drive:
    tools:
      - name: google_drive-find-file
      - name: google_drive-list-files
      - name: google_drive-create-file-from-text
      - name: google_drive-add-file-sharing-preference

actions:
  - Title: "Create Memo"
    Message: "Create an IC memo from the current Deal Room artifacts."
    Icon: "FcDocument"
  - Title: "Review Memo"
    Message: "Review this IC memo for citation gaps, assumptions, and decision readiness."
    Icon: "FcInspection"
  - Title: "Prepare Agenda"
    Message: "Prepare an IC agenda and debate prompts for this deal."
    Icon: "FcPlanner"

greeting: |
  I'm your IC Prep Producer. Share a Deal Room or IC memo and I will assemble or review the IC pack with citation checks, risk prompts, and draft follow-up actions.
