schemaVersion: "0.3"
status: platform-mapping
description: >
  VC-relevant MCP server definitions, Alludium platform mapping guidance, and
  application recommendation metadata. The plugin-level `.mcp.json` is safe for
  public reuse and uses user/workspace supplied credentials. When this pack is
  ingested into Alludium, the platform may map these external IDs to configured
  managed providers or workspace connections instead of requiring the plugin
  placeholders directly. Records with `recommendationStatus` also appear in the
  platform application picker; those records use the same `externalId` and
  `name` fields as the MCP mapping contract. Each recommendation must declare
  `supportedProjectTypes` so the platform can scope application recommendations
  to the project definitions where they are relevant. Individual management
  actions may declare a narrower `supportedProjectTypes` list when an integration
  is broadly useful but the setup action only applies to one project type.
recommendations:
  - externalId: affinity-mcp-server
    name: Affinity CRM
    category: CRM
    supportedProjectTypes:
      - vc_deal_room
      - vc_origination_pipeline
    use: Deal pipeline, CRM context, company/deal records, relationship context, and outreach history.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: recommended
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: Relationship CRM
      unlocks:
        - Relationship-aware company and founder context
        - Pipeline stage and opportunity review
        - CRM hygiene recommendations for review
      authorizationBoundary: Selecting Affinity only records that the firm uses it; OAuth or API authorization is still required before any data can be read.
      evidenceRequirement: User confirmation or an authorized Affinity connection.
    entityRoles:
      - organization
      - person
      - opportunity
    actions:
      - kind: setup
        supportedProjectTypes:
          - vc_deal_room
        label: Set up Affinity for Deal Pipelines
        taskDefinitionTemplateId: vc.affinity_setup
  - externalId: harmonic-mcp-oauth
    name: Harmonic
    category: Company Intelligence
    supportedProjectTypes:
      - vc_deal_room
      - vc_origination_pipeline
    use: Company enrichment, founder profiles, market intelligence, and sourcing context.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: recommended
    applicationRecommendation:
      pickerGroup: Private-Market Data
      systemCategory: Company Enrichment
      unlocks:
        - Company enrichment for sourcing and screening
        - Market-map and lead-list research
        - First-look company evidence
      authorizationBoundary: Selecting Harmonic does not grant data access; a user must authorize the Harmonic connection before agents can query it.
      evidenceRequirement: User confirmation, provider evidence, or an authorized Harmonic connection.
    entityRoles:
      - organization
      - person
    actions:
      - kind: setup
        supportedProjectTypes:
          - vc_deal_room
        label: Set up Harmonic for Deal Pipelines
        taskDefinitionTemplateId: vc.harmonic_setup
  - externalId: apify-actors-mcp
    name: Apify Actors
    category: Source Automation
    supportedProjectTypes:
      - vc_origination_pipeline
    use: Approved actor-based source discovery for VC origination pipelines, including founder, company, launch, and hiring signals when a workspace authorizes those sources.
    recommendationStatus: recommended
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    applicationRecommendation:
      pickerGroup: Origination Sources
      systemCategory: Source Automation
      unlocks:
        - Apify actor allowlist and source-scope setup
        - Read-only preview of selected actor results
        - Source registry evidence for origination pipeline configuration
      authorizationBoundary: Selecting Apify records source intent only; actor runs and data reads require authorization, approved actor scope, and explicit read-preview approval.
      evidenceRequirement: User confirmation, approved actor inventory, or an authorized Apify connection.
      alternatives:
        - Harmonic
        - LinkedIn
    entityRoles:
      - organization
      - person
    actions:
      - kind: setup
        supportedProjectTypes:
          - vc_origination_pipeline
        label: Set up Apify for Origination
        taskDefinitionTemplateId: vc.apify_setup
  - externalId: companies-house-mcp
    name: Companies House
    category: Company Registry
    supportedProjectTypes:
      - vc_origination_pipeline
    status: future
    use: Future typed UK company registry connector candidate for VC origination pipelines if public-page extraction proves insufficient.
    recommendationStatus: optional
    reason: Treat Companies House as a later managed connector candidate; the current pack uses Firecrawl against public Companies House pages instead of a Companies House MCP server.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    applicationRecommendation:
      pickerGroup: Origination Sources
      systemCategory: Company Registry
      unlocks:
