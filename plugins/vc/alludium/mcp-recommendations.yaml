schemaVersion: "0.3"
status: platform-application-recommendations
description: >
  VC application recommendations. Entries with an `externalMcpId` map to
  public-safe plugin MCP server definitions in `.mcp.json`.
recommendations:
  - id: affinity-mcp-server
    title: Affinity CRM
    description: Relationship CRM and dealflow workspace used for pipeline, people, organization, note, and opportunity context.
    recommendationStatus: recommended
    externalMcpId: affinity-mcp-server
    metadata:
      pickerGroup: CRM and Deal Tracking
      systemCategory: Relationship CRM
      unlocks:
        - Relationship-aware company and founder context
        - Pipeline stage and opportunity review
        - CRM hygiene recommendations for review
      authorizationBoundary: Selecting Affinity only records that the firm uses it; OAuth or API authorization is still required
        before any data can be read.
      evidenceRequirement: User confirmation or an authorized Affinity connection.
  - id: harmonic-mcp-oauth
    title: Harmonic
    description: Private-company enrichment and sourcing context for thesis-driven discovery and first-look research.
    recommendationStatus: recommended
    externalMcpId: harmonic-mcp-oauth
    metadata:
      pickerGroup: Private-Market Data
      systemCategory: Company Enrichment
      unlocks:
        - Company enrichment for sourcing and screening
        - Market-map and lead-list research
        - First-look company evidence
      authorizationBoundary: Selecting Harmonic does not grant data access; a user must authorize the Harmonic connection
        before agents can query it.
      evidenceRequirement: User confirmation, provider evidence, or an authorized Harmonic connection.
  - id: dealroom-mcp
    title: Dealroom
    description: Dealroom company and market data for sector, financing, investor, and comparable-company context.
    recommendationStatus: optional
    externalMcpId: dealroom-mcp
    metadata:
      pickerGroup: Private-Market Data
      systemCategory: Market Intelligence
      unlocks:
        - Comparable-company and financing context
        - Sector activity research
        - Diligence evidence for Deal Rooms
      authorizationBoundary: Selecting Dealroom does not grant access; connection authorization is required before Dealroom
        data can be used.
      evidenceRequirement: User confirmation, provider evidence, or an authorized Dealroom connection.
  - id: crunchbase
    title: Crunchbase
    status: future
    recommendationStatus: optional
    reason: No Crunchbase application or MCP server config exists yet.
    description: Private-market data source for company, funding, investor, and competitive context.
    metadata:
      pickerGroup: Private-Market Data
      systemCategory: Company Data
      unlocks:
        - Company and funding history context
        - Investor and competitor research
        - Sourcing list enrichment when a connection exists
      authorizationBoundary: Selecting Crunchbase is preference capture only until a supported connector exists.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - PitchBook
  - id: pitchbook
    title: PitchBook
    status: future
    recommendationStatus: optional
    reason: No PitchBook application or MCP server config exists yet.
    description: Private-market data source for company, financing, investor, and comparable-company research.
    metadata:
      pickerGroup: Private-Market Data
      systemCategory: Company Data
      unlocks:
        - Financing and investor context
        - Comparable-company research
        - Diligence and sourcing enrichment when a connector exists
      authorizationBoundary: Selecting PitchBook is preference capture only until a supported connector exists.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Crunchbase
  - id: attio
    title: Attio
    status: future
    recommendationStatus: optional
    reason: No Attio application or MCP server config exists yet.
    description: CRM or deal-tracking system alternative for firm pipeline and relationship workflows.
    metadata:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Deal and contact source-of-truth awareness
        - CRM update suggestions for review
        - Pipeline workflow recommendations
      authorizationBoundary: Selecting Attio only records that the firm uses it; no CRM records are read or written without
        a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Salesforce
        - HubSpot
        - Airtable
        - Notion
  - id: salesforce
    title: Salesforce
    status: future
    recommendationStatus: optional
    reason: No Salesforce MCP server config exists yet.
    description: CRM or deal-tracking system alternative for firm pipeline and relationship workflows.
    metadata:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Pipeline and contact source-of-truth awareness
        - Reviewable CRM update suggestions
        - Handoff planning for deal and portfolio workflows
      authorizationBoundary: Selecting Salesforce only records that the firm uses it; no CRM records are read or written without
        a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Affinity
        - Attio
        - HubSpot
  - id: hubspot
    title: HubSpot
    status: future
    recommendationStatus: optional
    reason: No HubSpot MCP server config exists yet.
    description: CRM or deal-tracking alternative for pipeline, relationship, and founder communication workflows.
    metadata:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Contact and company source-of-truth awareness
        - Reviewable CRM update suggestions
        - Founder follow-up context when a connector exists
      authorizationBoundary: Selecting HubSpot only records that the firm uses it; no CRM records are read or written without
        a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Affinity
        - Salesforce
        - Attio
  - id: airtable
    title: Airtable
    status: future
    recommendationStatus: optional
    reason: No Airtable application or MCP server config exists yet.
    description: Lightweight deal-tracking or operating-table system used by some firms instead of a dedicated CRM.
    metadata:
      pickerGroup: CRM and Deal Tracking
      systemCategory: Deal Tracking
      unlocks:
        - Deal-tracking source-of-truth awareness
        - Manual pipeline mapping prompts
        - Reviewable setup plan for future connectors
      authorizationBoundary: Selecting Airtable only records that the firm uses it; no records are read or written without
        a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Notion
        - Attio
  - id: notion
    title: Notion
    status: future
    recommendationStatus: optional
    reason: No Notion MCP server config exists yet.
    description: Lightweight deal-tracking, memo, knowledge-base, or operating-document workspace.
    metadata:
      pickerGroup: Docs and Workspace
      systemCategory: Workspace Docs
      unlocks:
        - Workspace document source awareness
        - Manual Deal Room and memo handoff prompts
        - Reviewable setup plan for future connectors
      authorizationBoundary: Selecting Notion only records that the firm uses it; no pages or databases are read or written
        without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Airtable
        - Google Drive
  - id: google_drive
    title: Google Drive and Docs
    status: future
    recommendationStatus: recommended
    reason: Google Drive tools exist on VC agent templates, but no workspace asset-pack application connector is registered
      yet.
    description: Shared documents, founder materials, diligence files, memos, and meeting notes.
    metadata:
      pickerGroup: Docs and Workspace
      systemCategory: Document Storage
      unlocks:
        - Founder material and diligence file context
        - IC memo and Deal Room document handoffs
        - Meeting-note and artifact review workflows
      authorizationBoundary: Selecting Google Drive only records that the firm uses it; Drive files are not read or written
        unless a user authorizes a supported connection.
      evidenceRequirement: User confirmation, file evidence, or future connector availability.
      alternatives:
        - Notion
  - id: slack
    title: Slack
    status: future
    recommendationStatus: recommended
    reason: No Slack MCP server config exists yet.
    description: Team communication workspace for deal routing, approvals, and collaboration context.
    metadata:
      pickerGroup: Collaboration
      systemCategory: Team Communication
      unlocks:
        - Collaboration-channel awareness
        - Reviewable notification and handoff planning
        - Future deal and IC workflow routing
      authorizationBoundary: Selecting Slack only records that the firm uses it; channels and messages are not read or written
        without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
  - id: linkedin
    title: LinkedIn
    status: future
    recommendationStatus: optional
    reason: LinkedIn tools exist on VC agent templates, but no workspace asset-pack application connector is registered yet.
    description: Professional network context for founder research, warm intro paths, and relationship mapping.
    metadata:
      pickerGroup: Relationship Intelligence
      systemCategory: Professional Network
      unlocks:
        - Founder and investor profile context
        - Warm-intro path research
        - Relationship-map enrichment when authorized
      authorizationBoundary: Selecting LinkedIn only records that the firm uses it; LinkedIn data access still requires an
        authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
  - id: granola-mcp
    title: Granola
    recommendationStatus: optional
    externalMcpId: granola-mcp
    description: Meeting notes and transcript source for founder calls, partner meetings, and IC prep.
    metadata:
      pickerGroup: Meetings and Transcripts
      systemCategory: Meeting Notes
      unlocks:
        - Meeting transcript and note context
        - Founder follow-up drafts for review
        - IC and partner meeting summaries
      authorizationBoundary: Selecting Granola does not grant transcript access; a user must authorize Granola before meeting
        content can be read.
      evidenceRequirement: User confirmation or an authorized Granola connection.
      alternatives:
        - Fireflies
        - Zoom
        - Google Meet
  - id: fireflies-mcp-oauth
    title: Fireflies
    recommendationStatus: optional
    externalMcpId: fireflies-mcp-oauth
    description: Meeting transcript source for founder calls, diligence calls, and portfolio conversations.
    metadata:
      pickerGroup: Meetings and Transcripts
      systemCategory: Meeting Transcripts
      unlocks:
        - Transcript search and summary context
        - Founder and diligence call follow-ups
        - Meeting-derived task recommendations
      authorizationBoundary: Selecting Fireflies does not grant transcript access; a user must authorize Fireflies before
        meeting content can be read.
      evidenceRequirement: User confirmation or an authorized Fireflies connection.
      alternatives:
        - Granola
        - Zoom
        - Google Meet
  - id: zoom
    title: Zoom
    status: future
    recommendationStatus: optional
    reason: No Zoom MCP server config exists yet.
    description: Meeting platform for founder calls, diligence calls, and partner meetings.
    metadata:
      pickerGroup: Meetings and Transcripts
      systemCategory: Video Meetings
      unlocks:
        - Meeting-system awareness for setup planning
        - Transcript-source prompts when paired with a transcript tool
        - Follow-up workflow recommendations
      authorizationBoundary: Selecting Zoom only records that the firm uses it; no meetings or transcripts are read without
        a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Google Meet
        - Granola
        - Fireflies
  - id: google_meet
    title: Google Meet
    status: future
    recommendationStatus: optional
    reason: No Google Meet MCP server config exists yet.
    description: Meeting platform for founder calls, diligence calls, and partner meetings.
    metadata:
      pickerGroup: Meetings and Transcripts
      systemCategory: Video Meetings
      unlocks:
        - Meeting-system awareness for setup planning
        - Transcript-source prompts when paired with a transcript tool
        - Follow-up workflow recommendations
      authorizationBoundary: Selecting Google Meet only records that the firm uses it; no meetings or transcripts are read
        without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Zoom
        - Granola
        - Fireflies
excludedPlatformMcps:
  - externalId: alludium-docs-mcp
    reason: Platform documentation MCP is useful for Alludium users but is not part of the VC workflow pack.
  - externalId: xero-mcp-server
    reason: Accounting workflows are not part of the first VC pack surface.
platformOnlyTemplateIntegrations:
  - externalId: alludium-platform
    reason: Alludium artifact and runtime tools are platform-owned, not public plugin MCP definitions.
  - externalId: google_drive
    reason: Google Drive access is provided through the Alludium/agent connector surface, not the VC plugin MCP manifest.
  - externalId: linkedin
    reason: LinkedIn access is provided through the Alludium/agent connector surface, not the VC plugin MCP manifest.
boundaries:
  secretsAllowed: false
  pluginDefinitionsUseAlludiumSecrets: false
  pipedreamProvidedIntegrationsIncluded: false
  notes: >
    Do not copy platform-owned secrets or environment values into this public
    repo. Public plugin definitions should use user/workspace credential
    placeholders. Alludium ingestion can map the same external IDs to managed
    platform defaults where the platform owns a safe default connection.
