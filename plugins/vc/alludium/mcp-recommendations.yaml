schemaVersion: "0.3"
status: platform-mapping
description: >
  VC-relevant MCP server definitions, Alludium platform mapping guidance, and
  application recommendation metadata. The plugin-level `.mcp.json` is safe for
  public reuse and uses user/workspace supplied credentials. When this pack is
  ingested into Alludium, the platform may map these external IDs to configured
  managed providers or workspace connections instead of requiring the plugin
  placeholders directly. Records with `recommendationStatus` also appear in the
  platform application picker; those records use the same `externalId` and
  `name` fields as the MCP mapping contract.
recommendations:
  - externalId: affinity-mcp-server
    name: Affinity CRM
    category: CRM
    use: Deal pipeline, CRM context, company/deal records, relationship context, and outreach history.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: recommended
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: Relationship CRM
      unlocks:
        - Relationship-aware company and founder context
        - Pipeline stage and opportunity review
        - CRM hygiene recommendations for review
      authorizationBoundary: Selecting Affinity only records that the firm uses it; OAuth or API authorization is still required before any data can be read.
      evidenceRequirement: User confirmation or an authorized Affinity connection.
    entityRoles:
      - organization
      - person
      - opportunity
    actions:
      - kind: discovery
        label: Explore Affinity lists and stages
        taskDefinitionTemplateId: vc.affinity_discovery
        skillId: vc-affinity-discovery
      - kind: sync_read
        label: Preview and import Affinity pipeline data
        taskDefinitionTemplateId: vc.affinity_sync_read
        skillId: vc-affinity-sync-read
      - kind: sync_write
        label: Draft Affinity write-back proposals
        taskDefinitionTemplateId: vc.affinity_sync_write
        skillId: vc-affinity-sync-write
  - externalId: harmonic-mcp-oauth
    name: Harmonic
    category: Company Intelligence
    use: Company enrichment, founder profiles, market intelligence, and sourcing context.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: recommended
    applicationRecommendation:
      pickerGroup: Private-Market Data
      systemCategory: Company Enrichment
      unlocks:
        - Company enrichment for sourcing and screening
        - Market-map and lead-list research
        - First-look company evidence
      authorizationBoundary: Selecting Harmonic does not grant data access; a user must authorize the Harmonic connection before agents can query it.
      evidenceRequirement: User confirmation, provider evidence, or an authorized Harmonic connection.
    entityRoles:
      - organization
      - person
    actions:
      - kind: discovery
        label: Explore Harmonic saved searches and source scopes
        taskDefinitionTemplateId: vc.harmonic_discovery
        skillId: vc-harmonic-discovery
      - kind: sync_read
        label: Preview Harmonic search results for sourcing context
        taskDefinitionTemplateId: vc.harmonic_sync_read
        skillId: vc-harmonic-sync-read
  - externalId: dealroom-mcp
    name: Dealroom
    category: Private Market Data
    use: Financing, investor, funding-round, and private-market context.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: optional
    applicationRecommendation:
      pickerGroup: Private-Market Data
      systemCategory: Market Intelligence
      unlocks:
        - Comparable-company and financing context
        - Sector activity research
        - Diligence evidence for Deal Rooms
      authorizationBoundary: Selecting Dealroom does not grant access; connection authorization is required before Dealroom data can be used.
      evidenceRequirement: User confirmation, provider evidence, or an authorized Dealroom connection.
  - externalId: exa-mcp-hosted
    name: Exa Search
    category: Web Research
    use: Public web, company, people, code, and deeper research workflows.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: platform_or_workspace_connection
    platformDefaultAvailable: true
  - externalId: firecrawl-mcp-hosted
    name: Firecrawl
    category: Web Extraction
    use: First-party website extraction, website mapping, page evidence, and source-material gathering.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: platform_or_workspace_connection
    platformDefaultAvailable: true
  - externalId: brave-search-mcp
    name: Brave Search
    category: Web Search
    use: Broad public web and news search fallback.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: platform_or_workspace_connection
    platformDefaultAvailable: true
  - externalId: serpapi-mcp
    name: SerpAPI Search
    category: Web Search
    use: Broad search fallback across Google, Bing, YouTube, and other search surfaces.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: platform_or_workspace_connection
    platformDefaultAvailable: true
  - externalId: tavily-mcp-hosted
    name: Tavily Search
    category: Web Search
    use: Web search and extraction when a workspace prefers Tavily-backed research.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
  - externalId: perplexity-mcp
    name: Perplexity
    category: Web Research
    use: Search, reasoning, and deep research workflows where Perplexity is connected.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
  - externalId: brightdata-mcp-hosted
    name: Bright Data
    category: Web Extraction
    use: Real-time web access, search, and scraping where a workspace has Bright Data access.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
  - externalId: meltwater-mcp
    name: Meltwater
    category: Media Intelligence
    use: News, media monitoring, and market-signal intelligence where a workspace has Meltwater access.
    pluginCredentialBoundary: user_or_workspace_api_key
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
  - externalId: granola-mcp
    name: Granola
    category: Meeting Notes
    use: Meeting transcript and notes context when connected.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: optional
    applicationRecommendation:
      pickerGroup: Meetings and Transcripts
      systemCategory: Meeting Notes
      unlocks:
        - Meeting transcript and note context
        - Founder follow-up drafts for review
        - IC and partner meeting summaries
      authorizationBoundary: Selecting Granola does not grant transcript access; a user must authorize Granola before meeting content can be read.
      evidenceRequirement: User confirmation or an authorized Granola connection.
      alternatives:
        - Fireflies
        - Zoom
        - Google Meet
  - externalId: otter-mcp-oauth
    name: Otter AI
    category: Meeting Notes
    use: Meeting transcript context when connected.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
  - externalId: fireflies-mcp-oauth
    name: Fireflies
    category: Meeting Notes
    use: Meeting transcript, summary, contact, and user-data context when connected.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: optional
    applicationRecommendation:
      pickerGroup: Meetings and Transcripts
      systemCategory: Meeting Transcripts
      unlocks:
        - Transcript search and summary context
        - Founder and diligence call follow-ups
        - Meeting-derived task recommendations
      authorizationBoundary: Selecting Fireflies does not grant transcript access; a user must authorize Fireflies before meeting content can be read.
      evidenceRequirement: User confirmation or an authorized Fireflies connection.
      alternatives:
        - Granola
        - Zoom
        - Google Meet
  - externalId: crunchbase
    name: Crunchbase
    category: Private Market Data
    status: future
    use: Private-market data source for company, funding, investor, and competitive context.
    recommendationStatus: optional
    reason: No Crunchbase application or MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: Private-Market Data
      systemCategory: Company Data
      unlocks:
        - Company and funding history context
        - Investor and competitor research
        - Sourcing list enrichment when a connection exists
      authorizationBoundary: Selecting Crunchbase is preference capture only until a supported connector exists.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - PitchBook
  - externalId: pitchbook
    name: PitchBook
    category: Private Market Data
    status: future
    use: Private-market data source for company, financing, investor, and comparable-company research.
    recommendationStatus: optional
    reason: No PitchBook application or MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: Private-Market Data
      systemCategory: Company Data
      unlocks:
        - Financing and investor context
        - Comparable-company research
        - Diligence and sourcing enrichment when a connector exists
      authorizationBoundary: Selecting PitchBook is preference capture only until a supported connector exists.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Crunchbase
  - externalId: attio
    name: Attio
    category: CRM
    status: future
    use: CRM or deal-tracking system alternative for firm pipeline and relationship workflows.
    recommendationStatus: optional
    reason: No Attio application or MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Deal and contact source-of-truth awareness
        - CRM update suggestions for review
        - Pipeline workflow recommendations
      authorizationBoundary: Selecting Attio only records that the firm uses it; no CRM records are read or written without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Salesforce
        - HubSpot
        - Airtable
        - Notion
  - externalId: salesforce
    name: Salesforce
    category: CRM
    status: future
    use: CRM or deal-tracking system alternative for firm pipeline and relationship workflows.
    recommendationStatus: optional
    reason: No Salesforce MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Pipeline and contact source-of-truth awareness
        - Reviewable CRM update suggestions
        - Handoff planning for deal and portfolio workflows
      authorizationBoundary: Selecting Salesforce only records that the firm uses it; no CRM records are read or written without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Affinity
        - Attio
        - HubSpot
  - externalId: hubspot
    name: HubSpot
    category: CRM
    status: future
    use: CRM or deal-tracking alternative for pipeline, relationship, and founder communication workflows.
    recommendationStatus: optional
    reason: No HubSpot MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: CRM
      unlocks:
        - Contact and company source-of-truth awareness
        - Reviewable CRM update suggestions
        - Founder follow-up context when a connector exists
      authorizationBoundary: Selecting HubSpot only records that the firm uses it; no CRM records are read or written without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Affinity
        - Salesforce
        - Attio
  - externalId: airtable
    name: Airtable
    category: Deal Tracking
    status: future
    use: Lightweight deal-tracking or operating-table system used by some firms instead of a dedicated CRM.
    recommendationStatus: optional
    reason: No Airtable application or MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: CRM and Deal Tracking
      systemCategory: Deal Tracking
      unlocks:
        - Deal-tracking source-of-truth awareness
        - Manual pipeline mapping prompts
        - Reviewable setup plan for future connectors
      authorizationBoundary: Selecting Airtable only records that the firm uses it; no records are read or written without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Notion
        - Attio
  - externalId: notion
    name: Notion
    category: Docs and Workspace
    use: Lightweight deal-tracking, memo, knowledge-base, or operating-document workspace.
    recommendationStatus: optional
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    applicationRecommendation:
      pickerGroup: Docs and Workspace
      systemCategory: Workspace Docs
      unlocks:
        - Workspace document and database source awareness
        - Deal Room, memo, and knowledge-base context previews
        - Reviewable page and database update proposals
      authorizationBoundary: Selecting Notion only records that the firm uses it; pages and databases are not read or written without an authorized Notion connection and approved scope.
      evidenceRequirement: User confirmation, workspace evidence, or an authorized Notion connection.
      alternatives:
        - Airtable
        - Google Drive
    entityRoles:
      - document
      - project
    actions:
      - kind: discovery
        label: Explore Notion pages and databases
        taskDefinitionTemplateId: vc.notion_discovery
        skillId: vc-notion-discovery
      - kind: sync_read
        label: Preview selected Notion page and database context
        taskDefinitionTemplateId: vc.notion_sync_read
        skillId: vc-notion-sync-read
      - kind: sync_write
        label: Draft Notion update proposals
        taskDefinitionTemplateId: vc.notion_sync_write
        skillId: vc-notion-sync-write
  - externalId: google_drive
    name: Google Drive and Docs
    category: Document Storage
    use: Shared documents, founder materials, diligence files, memos, and meeting notes.
    recommendationStatus: recommended
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    applicationRecommendation:
      pickerGroup: Docs and Workspace
      systemCategory: Document Storage
      unlocks:
        - Founder material and diligence file context
        - IC memo and Deal Room document handoffs
        - Reviewable file, folder, and source-scope previews
      authorizationBoundary: Selecting Google Drive only records that the firm uses it; Drive files are not read or written unless a user authorizes a supported connection and approves folder or file scope.
      evidenceRequirement: User confirmation, file evidence, or an authorized Google Drive connection.
      alternatives:
        - Notion
    entityRoles:
      - document
    actions:
      - kind: discovery
        label: Explore Google Drive folders and files
        taskDefinitionTemplateId: vc.google_drive_discovery
        skillId: vc-google-drive-discovery
      - kind: sync_read
        label: Preview selected Google Drive context
        taskDefinitionTemplateId: vc.google_drive_sync_read
        skillId: vc-google-drive-sync-read
      - kind: sync_write
        label: Draft Google Drive file proposals
        taskDefinitionTemplateId: vc.google_drive_sync_write
        skillId: vc-google-drive-sync-write
  - externalId: slack_v2
    name: Slack
    category: Collaboration
    use: Team communication workspace for deal routing, approvals, and collaboration context.
    pluginCredentialBoundary: user_or_workspace_oauth
    alludiumPlatformMapping: workspace_connection
    platformDefaultAvailable: false
    recommendationStatus: recommended
    applicationRecommendation:
      pickerGroup: Collaboration
      systemCategory: Team Communication
      unlocks:
        - Collaboration-channel awareness
        - Reviewable notification and handoff planning
        - Deal and IC workflow routing after channel scope approval
      authorizationBoundary: Selecting Slack only records that the firm uses it; channels and messages are not read or written without an authorized Slack connection and approved scope.
      evidenceRequirement: User confirmation or an authorized Slack connection.
    entityRoles:
      - message_or_conversation
      - task_or_issue
    actions:
      - kind: discovery
        label: Explore Slack workspaces and channels
        taskDefinitionTemplateId: vc.slack_discovery
        skillId: vc-slack-discovery
      - kind: sync_read
        label: Preview selected Slack channel and thread context
        taskDefinitionTemplateId: vc.slack_sync_read
        skillId: vc-slack-sync-read
      - kind: sync_write
        label: Draft approved Slack handoff notifications
        taskDefinitionTemplateId: vc.slack_sync_write
        skillId: vc-slack-sync-write
  - externalId: linkedin
    name: LinkedIn
    category: Relationship Intelligence
    status: future
    use: Professional network context for founder research, warm intro paths, and relationship mapping.
    recommendationStatus: optional
    reason: LinkedIn tools exist on VC agent templates, but no workspace asset-pack application connector is registered yet.
    applicationRecommendation:
      pickerGroup: Relationship Intelligence
      systemCategory: Professional Network
      unlocks:
        - Founder and investor profile context
        - Warm-intro path research
        - Relationship-map enrichment when authorized
      authorizationBoundary: Selecting LinkedIn only records that the firm uses it; LinkedIn data access still requires an authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
  - externalId: zoom
    name: Zoom
    category: Meetings and Transcripts
    status: future
    use: Meeting platform for founder calls, diligence calls, and partner meetings.
    recommendationStatus: optional
    reason: No Zoom MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: Meetings and Transcripts
      systemCategory: Video Meetings
      unlocks:
        - Meeting-system awareness for setup planning
        - Transcript-source prompts when paired with a transcript tool
        - Follow-up workflow recommendations
      authorizationBoundary: Selecting Zoom only records that the firm uses it; no meetings or transcripts are read without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Google Meet
        - Granola
        - Fireflies
  - externalId: google_meet
    name: Google Meet
    category: Meetings and Transcripts
    status: future
    use: Meeting platform for founder calls, diligence calls, and partner meetings.
    recommendationStatus: optional
    reason: No Google Meet MCP server config exists yet.
    applicationRecommendation:
      pickerGroup: Meetings and Transcripts
      systemCategory: Video Meetings
      unlocks:
        - Meeting-system awareness for setup planning
        - Transcript-source prompts when paired with a transcript tool
        - Follow-up workflow recommendations
      authorizationBoundary: Selecting Google Meet only records that the firm uses it; no meetings or transcripts are read without a future authorized connector.
      evidenceRequirement: User confirmation or future connector availability.
      alternatives:
        - Zoom
        - Granola
        - Fireflies
excludedPlatformMcps:
  - externalId: alludium-docs-mcp
    reason: Platform documentation MCP is useful for Alludium users but is not part of the VC workflow pack.
  - externalId: xero-mcp-server
    reason: Accounting workflows are not part of the first VC pack surface.
platformOnlyTemplateIntegrations:
  - externalId: alludium-platform
    reason: Alludium artifact and runtime tools are platform-owned, not public plugin MCP definitions.
  - externalId: google_drive
    reason: Google Drive access is provided through the Alludium/agent connector surface, not the VC plugin MCP manifest.
  - externalId: linkedin
    reason: LinkedIn access is provided through the Alludium/agent connector surface, not the VC plugin MCP manifest.
boundaries:
  secretsAllowed: false
  pluginDefinitionsUseAlludiumSecrets: false
  pipedreamProvidedIntegrationsIncluded: false
  notes: >
    Do not copy platform-owned secrets or environment values into this public
    repo. Public plugin definitions should use user/workspace credential
    placeholders. Alludium ingestion can map the same external IDs to managed
    platform defaults where the platform owns a safe default connection.
